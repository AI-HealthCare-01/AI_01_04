<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-text="chatbot.title">MEDIMATE AI 상담</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- Top Header -->
<nav class="top-header d-flex justify-content-between align-items-center sticky-top">
  <div class="brand d-flex align-items-center gap-2">
    <i class="bi bi-activity"></i> MEDIMATE
    <span style="font-weight:400;color:#999;font-size:.78rem;margin-left:6px" data-text="common.serviceTagline">당신의 곁에, 언제나</span>
  </div>
  <div class="user-area d-flex align-items-center gap-3">
    <span class="text-muted" id="header-user-name">환영합니다</span>
    <a href="profile.html" class="btn btn-myinfo"><i class="bi bi-person-fill me-1"></i>내 정보</a>
  </div>
</nav>

<div class="dashboard-card">
  <!-- Hero -->
  <div class="mb-1">
    <div class="hero-label"><i class="bi bi-activity me-1"></i>MEDIMATE</div>
    <div class="hero-title" data-text="chatbot.title">MEDIMATE AI 상담</div>
    <p class="hero-desc" data-text="chatbot.subtitle">복약과 건강 고민, 메디메이트와 편하게 이야기해보세요.</p>
  </div>

  <!-- Tabs -->
  <div class="dashboard-tabs">
    <a href="profile.html"><i class="bi bi-person me-1"></i>내 프로필</a>
    <a href="dashboard.html"><i class="bi bi-grid-1x2 me-1"></i>대시보드</a>
    <a href="scans.html"><i class="bi bi-file-earmark-plus me-1"></i>새 문서 등록</a>
    <a href="medications.html"><i class="bi bi-capsule me-1"></i>복용 관리 이력</a>
    <a href="health.html"><i class="bi bi-heart-pulse me-1"></i>건강 관리 이력</a>
    <a href="chatbot.html" class="active"><i class="bi bi-chat-dots me-1"></i>AI 챗봇</a>
  </div>

  <!-- Status -->
  <div id="chatbot-status" class="alert small p-2 mb-3 d-none"></div>

  <!-- Chat Layout -->
  <div class="chat-layout">
    <!-- Left sidebar -->
    <div class="chat-sidebar">
      <div class="sb-card">
        <div class="sb-title"><i class="bi bi-gear me-1"></i><span data-text="chatbot.modeLabel">상담 모드</span></div>
        <select id="chat-mode" onchange="handleModeChange()">
          <option value="medication" data-text="chatbot.modeMedication">복약 상담</option>
          <option value="health" data-text="chatbot.modeHealth">생활 건강 상담</option>
        </select>
      </div>

      <div class="sb-card" id="medication-fields">
        <div class="sb-title"><i class="bi bi-clipboard2-pulse me-1"></i>스캔 문서 선택</div>
        <div id="scan-card-list" style="display:flex;flex-direction:column;gap:6px">
          <span style="font-size:.76rem;color:#aaa">스캔 정보를 불러오는 중...</span>
        </div>
      </div>

      <div class="sb-card">
        <div class="sb-title"><i class="bi bi-lightning me-1"></i><span data-text="chatbot.quickQuestionTitle">바로 질문하기</span></div>
        <div id="quick-question-list" class="quick-chip-wrap"></div>
      </div>

      <div class="sb-card">
        <div class="sb-title"><i class="bi bi-info-circle me-1"></i><span data-text="chatbot.contextTitle">AI가 참고하는 정보</span></div>
        <div id="chatbot-context-list">
          <span class="text-muted" style="font-size:.76rem" data-text="chatbot.contextLoading">추천과 복약 정보를 불러오는 중입니다...</span>
        </div>
      </div>
    </div>

    <!-- Right chat area -->
    <div class="chat-area">
      <div class="chat-header">
        <div class="ch-title"><i class="bi bi-chat-dots me-1" style="color:#6da285"></i><span data-text="chatbot.chatTitle">대화창</span></div>
        <button class="btn-reset" onclick="resetConversation()"><i class="bi bi-arrow-counterclockwise me-1"></i><span data-text="chatbot.resetButton">대화 비우기</span></button>
      </div>

      <div class="chat-log" id="chat-log"></div>

      <div class="chat-input-area">
        <textarea id="chat-question" rows="1" data-placeholder="chatbot.questionPlaceholder" placeholder="예: 이 약은 식후에 먹어야 하나요?" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat(event)}"></textarea>
        <button class="btn-send" id="send-chat-btn" onclick="sendChat(event)"><i class="bi bi-send me-1"></i><span data-text="chatbot.sendButton">전송</span></button>
      </div>
      <div style="padding:8px 18px;text-align:center;font-size:.72rem;color:#999;border-top:1px solid #eef3f0;background:#fafdfb;">
        ⚕️ 본 서비스는 의료 전문가의 진료를 대체하지 않습니다. 정확한 진단과 처방은 반드시 담당 의료진과 상담하세요.
      </div>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/texts.js"></script>
<script src="js/api.js"></script>
<script>
let currentUser = null;
let currentUserContext = null;
let currentActiveRecommendations = [];
let currentSessionId = null;
let currentScanCards = [];
let currentSelectedDiseases = [];
let currentSelectedMeds = [];
let isSending = false;

function setStatus(message = '', type = 'info') {
  const box = document.getElementById('chatbot-status');
  if (!message) { box.className = 'alert d-none small p-2 mb-3'; box.innerText = ''; return; }
  box.className = `alert alert-${type} small p-2 mb-3`;
  box.innerText = message;
}

function renderMarkdown(text) {
  if (!text) return '';
  return escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h6 style="margin:10px 0 4px;color:#6da285;font-weight:700">$1</h6>')
    .replace(/^## (.+)$/gm, '<h6 style="margin:12px 0 4px;color:#6da285;font-weight:700">$1</h6>')
    .replace(/^# (.+)$/gm, '<h6 style="margin:14px 0 6px;color:#6da285;font-weight:700;font-size:.95rem">$1</h6>')
    .replace(/^\[(.+?)\]$/gm, '<div style="margin:10px 0 4px;font-weight:700;color:#6da285">[$1]</div>')
    .replace(/^- (.+)$/gm, '<div style="padding-left:12px">• $1</div>')
    .replace(/\n/g, '<br>');
}

function appendStreamMessage() {
  const log = document.getElementById('chat-log');
  const name = escapeHtml(getText('chatbot.assistantName', '메디메이트'));
  const html = `
    <div class="chat-msg assistant" id="stream-msg">
      <div class="chat-avatar">🤖</div>
      <div class="chat-msg-body">
        <div class="chat-msg-name">${name}</div>
        <div class="chat-bubble" id="stream-bubble"></div>
      </div>
    </div>`;
  log.insertAdjacentHTML('beforeend', html);
  log.scrollTop = log.scrollHeight;
}

function appendMessage(role, content) {
  const log = document.getElementById('chat-log');
  const isUser = role === 'user';
  const name = isUser ? escapeHtml(getText('chatbot.userName', '나')) : escapeHtml(getText('chatbot.assistantName', '메디메이트'));
  const body = isUser ? escapeHtml(content) : renderMarkdown(content);
  const avatar = isUser ? '' : '<div class="chat-avatar">🤖</div>';
  const html = `
    <div class="chat-msg ${role}">
      ${avatar}
      <div class="chat-msg-body">
        <div class="chat-msg-name">${name}</div>
        <div class="chat-bubble">${body}</div>
      </div>
    </div>`;
  log.insertAdjacentHTML('beforeend', html);
  log.scrollTop = log.scrollHeight;
}

function handleModeChange() {
  const mode = document.getElementById('chat-mode').value;
  document.getElementById('medication-fields').style.display = mode === 'medication' ? 'block' : 'none';
  renderQuickQuestions();
}

function renderScanCards(cards) {
  const container = document.getElementById('scan-card-list');
  container.innerHTML = '';
  if (!cards || !cards.length) {
    container.innerHTML = '<span style="font-size:.76rem;color:#aaa">저장된 스캔 문서가 없습니다.</span>';
    return;
  }
  cards.forEach((c, i) => {
    const diag = c.diagnoses?.join(', ') || '진단명 없음';
    const drugs = c.drug_names?.slice(0, 3).join(', ') || '약품 없음';
    const extra = (c.drug_names?.length || 0) > 3 ? ` 외 ${c.drug_names.length - 3}건` : '';
    const dateStr = c.document_date || '';
    const card = document.createElement('div');
    card.className = 'scan-select-card';
    card.dataset.idx = i;
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:.72rem;color:#6da285;font-weight:600">${dateStr ? escapeHtml(dateStr) : 'Scan #' + c.scan_id}</span>
        <span class="scan-check-icon" style="font-size:.8rem;color:#ccc"><i class="bi bi-check-circle"></i></span>
      </div>
      <div style="font-size:.78rem;color:#333;margin-top:4px;font-weight:500">${escapeHtml(diag)}</div>
      <div style="font-size:.72rem;color:#888;margin-top:2px">${escapeHtml(drugs)}${extra}</div>
    `;
    card.onclick = () => {
      card.classList.toggle('selected');
      syncScanSelection();
    };
    // 첫 번째 스캔 자동 선택
    if (i === 0) card.classList.add('selected');
    container.appendChild(card);
  });
  syncScanSelection();
}

function syncScanSelection() {
  const cards = document.querySelectorAll('.scan-select-card');
  const selectedDiseases = new Set();
  const selectedMeds = new Set();
  cards.forEach(card => {
    const icon = card.querySelector('.scan-check-icon i');
    if (card.classList.contains('selected')) {
      icon.className = 'bi bi-check-circle-fill';
      icon.style.color = '#6da285';
      const idx = parseInt(card.dataset.idx);
      const c = currentScanCards[idx];
      if (c) {
        c.diagnoses?.forEach(d => selectedDiseases.add(d));
        c.drug_names?.forEach(m => selectedMeds.add(m));
      }
    } else {
      icon.className = 'bi bi-check-circle';
      icon.style.color = '#ccc';
    }
  });
  currentSelectedDiseases = [...selectedDiseases];
  currentSelectedMeds = [...selectedMeds];
  updateContextCard();
}

function updateContextCard() {
  const container = document.getElementById('chatbot-context-list');
  const sections = [];

  if (currentSelectedDiseases.length) {
    sections.push(`
      <div class="context-card">
        <div class="context-label">진단명</div>
        <div class="fw-semibold">${currentSelectedDiseases.map(d => escapeHtml(d)).join('<br>')}</div>
      </div>`);
  }

  if (currentSelectedMeds.length) {
    sections.push(`
      <div class="context-card">
        <div class="context-label">약품명</div>
        <div class="fw-semibold">${currentSelectedMeds.map(m => escapeHtml(m)).join('<br>')}</div>
      </div>`);
  }

  if (currentActiveRecommendations?.length) {
    sections.push(`
      <div class="context-card">
        <div class="context-label">활성 추천</div>
        <div class="fw-semibold">${currentActiveRecommendations.slice(0, 3).map(r => escapeHtml(r.content || '-')).join('<br>')}</div>
      </div>`);
  }

  if (!sections.length) {
    container.innerHTML = '<span style="font-size:.76rem;color:#aaa">스캔 문서를 선택하면 AI가 참고할 정보가 표시됩니다.</span>';
    return;
  }
  container.innerHTML = sections.join('');
}

function getQuickQuestions(mode) {
  if (mode === 'health') {
    return [
      getText('chatbot.quickHealth1', '요즘 잠이 잘 안 오는데 생활 습관을 어떻게 바꾸면 좋을까요?'),
      getText('chatbot.quickHealth2', '식단과 운동을 같이 관리하려면 어떤 순서로 시작하면 좋을까요?'),
      getText('chatbot.quickHealth3', '피곤함이 계속될 때 병원에 가야 하는 신호가 있을까요?'),
    ];
  }
  return [
    getText('chatbot.quickMedication1', '이 약은 식전/식후 언제 먹는 게 좋나요?'),
    getText('chatbot.quickMedication2', '현재 약들끼리 같이 먹어도 되는지 확인해 주세요.'),
    getText('chatbot.quickMedication3', '부작용이 나타나면 어떤 증상을 먼저 봐야 하나요?'),
  ];
}

function renderQuickQuestions() {
  const mode = document.getElementById('chat-mode').value;
  const container = document.getElementById('quick-question-list');
  container.innerHTML = '';
  getQuickQuestions(mode).forEach(q => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'quick-chip';
    btn.textContent = q;
    btn.onclick = () => { document.getElementById('chat-question').value = q; document.getElementById('chat-question').focus(); };
    container.appendChild(btn);
  });
}

function renderUserContext() {
  updateContextCard();
}


function resetConversation() {
  document.getElementById('chat-log').innerHTML = '';
  currentSessionId = null;
  appendMessage('assistant', getText('chatbot.welcomeMessage', '안녕하세요 😊\n메디메이트입니다.\n지금 드시는 약이나 건강 상태에 대해 궁금한 점 있으신가요?'));
  document.getElementById('chat-question').value = '';
  setStatus('');
}

async function sendChat(event) {
  if (event) event.preventDefault();

  const question = document.getElementById('chat-question').value.trim();
  const mode = document.getElementById('chat-mode').value;

  const rawDisease = currentSelectedDiseases.join(', ') || (
    currentUserContext?.diseases?.map(d => d.kcd_code || d.name).filter(Boolean).join(', ') || null
  );

  const rawMedications = currentSelectedMeds.length > 0
    ? currentSelectedMeds
    : (currentUserContext?.medications?.map(m => m.drug_name).filter(Boolean) || []);

  const fallbackDisease = rawDisease;
  const fallbackMedications = rawMedications;

  if (!currentUser?.id) {
    setStatus(getText('chatbot.userMissing', '사용자 정보를 확인할 수 없어 상담을 시작할 수 없습니다.'), 'danger');
    return;
  }

  if (!question) {
    setStatus(getText('chatbot.questionRequired', '질문을 먼저 입력해 주세요.'), 'warning');
    return;
  }

  if (mode === 'medication' && fallbackMedications.length === 0) {
    setStatus(getText('chatbot.medicationsRequired', '복약 상담 모드에서는 현재 복용 중인 약을 한 개 이상 입력해 주세요.'), 'warning');
    return;
  }

  if (isSending) return;
  isSending = true;
  const btn = document.getElementById('send-chat-btn');

  try {
    btn.disabled = true;
    setStatus('', 'info');
    appendMessage('user', question);
    document.getElementById('chat-question').value = '';

    const body = {
      patient_id: String(currentUser.id),
      session_id: currentSessionId,
      mode,
      user_question: question,
      disease_code: fallbackDisease,
      medications: fallbackMedications,
      use_context: true,
    };

    const token = localStorage.getItem('access_token');
    const res = await fetch(`${window.api.fetchAPI.length ? API_BASE_URL : BACKEND_ORIGIN + '/api/v1'}/chatbot/chat/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify(body),
    });

    if (!res.ok) throw new Error('응답 오류: ' + res.status);

    appendStreamMessage();
    const bubble = document.getElementById('stream-bubble');
    const log = document.getElementById('chat-log');
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.token) {
            fullText += data.token;
            bubble.innerHTML = renderMarkdown(fullText);
            log.scrollTop = log.scrollHeight;
          }
          if (data.done && data.session_id) {
            currentSessionId = data.session_id;
          }
        } catch {}
      }
    }

    const streamMsg = document.getElementById('stream-msg');
    if (streamMsg) streamMsg.removeAttribute('id');
    const streamBubble = document.getElementById('stream-bubble');
    if (streamBubble) streamBubble.removeAttribute('id');

    if (!fullText) {
      appendMessage('assistant', getText('chatbot.emptyAnswer', '답변을 받아오지 못했습니다.'));
    }
    setStatus(getText('chatbot.success', '답변이 도착했습니다.'), 'success');
  } catch (err) {
    appendMessage('assistant', getText('chatbot.errorReply', '죄송합니다. 답변을 가져오는 중 문제가 생겼습니다.'));
    setStatus(err.message, 'danger');
  } finally {
    btn.disabled = false;
    isSending = false;
  }
}

async function initChatbotPage() {
  applyTextBindings();
  document.title = getText('chatbot.title', document.title);
  handleModeChange();

  try {
    currentUser = await window.api.getUserMe();
    const name = currentUser.name || getText('common.userFallbackName', '사용자');

    localStorage.setItem('user_name', name);
    document.getElementById('header-user-name').textContent = `환영합니다, ${name}님`;
    const check = await window.api.checkChatbotPatient(currentUser.id);
    if (!check || !check.exists) {
      setStatus(getText('chatbot.patientCheckFailed', '현재 사용자 정보가 상담 대상과 연결되지 않았습니다.'), 'warning');
    } else {
      setStatus(getText('chatbot.ready', '상담 준비가 완료되었습니다.'), 'success');
    }

    currentUserContext = await window.api.getUserContext(currentUser.id);

    try {
      currentActiveRecommendations = await window.api.getActiveRecommendations();
    } catch {
      currentActiveRecommendations = [];
    }

    renderUserContext();

    // 스캔 카드 렌더링
    currentScanCards = currentUserContext?.scan_cards || [];
    renderScanCards(currentScanCards);

  } catch (err) {
    setStatus(getText('chatbot.initError', '상담 초기화 중 문제가 발생했습니다: ') + err.message, 'danger');
  }
}

// Auth check
if (!localStorage.getItem('access_token')) {
  window.location.href = 'index.html';
} else {
  document.addEventListener('DOMContentLoaded', () => {
    initChatbotPage();
    appendMessage('assistant', getText('chatbot.welcomeMessage', '안녕하세요 😊\n메디메이트입니다.\n지금 드시는 약이나 건강 상태에 대해 궁금한 점 있으신가요?'));
  });
}
</script>

<script src="js/accessibility.js"></script>
</body>
</html>
