<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-text="scans.title">처방전 및 진단서 등록</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .drug-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            background: rgba(93, 120, 94, 0.12);
            color: var(--primary-color);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .drug-suggestion-list {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            z-index: 20;
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
        }

        .drug-suggestion-item {
            width: 100%;
            border: 0;
            background: transparent;
            text-align: left;
            padding: 0.75rem 1rem;
        }

        .drug-suggestion-item:hover {
            background: rgba(93, 120, 94, 0.08);
        }

        .diagnosis-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .diagnosis-row input { flex: 1; }

        .drug-entry-card {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: #fff;
        }

        .drug-entry-card .drug-entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .drug-entry-card .dose-fields {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.5rem;
        }

        .dose-fields input, .dose-fields select {
            font-size: 0.8rem;
            padding: 0.3rem 0.5rem;
        }

        .dose-fields label {
            font-size: 0.7rem;
            margin-bottom: 0.15rem;
            color: #888;
        }
    </style>
</head>

<body>

    <button class="btn btn-primary d-lg-none position-fixed top-0 end-0 m-3 z-3" type="button"
        onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>

    <div class="app-wrapper">
        <nav id="sidebar-container" class="sidebar shadow-sm"></nav>

        <main class="main-content">
            <div class="fade-in mb-4 pb-2 border-bottom">
                <h3 class="fw-bold mb-0" data-text="scans.title">처방전 자동 입력</h3>
                <p class="text-soft mt-1 mb-0" data-text="scans.subtitle">사진을 올리시면 AI가 약물 정보를 분석해 복약 일정에 자동으로 넣어드립니다.</p>
            </div>

            <div class="row g-4 fade-in">
                <div class="col-md-5">
                    <div class="card p-4 h-100 text-center">
                        <h5 class="fw-bold text-primary-custom mb-3" data-text="scans.cardTitle">새 처방전/기록 등록</h5>

                        <div id="upload-status" class="alert d-none small p-2 mb-3"></div>

                        <div class="mb-3 text-start">
                            <label class="form-label text-secondary small fw-bold" data-text="scans.docTypeLabel">문서 종류 선택</label>
                            <select id="docType" class="form-select border-1 px-3 py-2 bg-light">
                                <option value="prescription" data-text="scans.prescriptionOption">처방전 (약국 봉투)</option>
                                <option value="medical_record" data-text="scans.recordOption">진단서/소견서</option>
                            </select>
                        </div>

                        <div class="upload-area p-4 mt-2" onclick="document.getElementById('file-upload').click()">
                            <i class="bi bi-cloud-arrow-up display-3 text-primary-custom mb-2"></i>
                            <h6 class="fw-bold mb-1" data-text="scans.uploadTitle">이미지 선택하기</h6>
                            <p class="small text-soft mb-0" data-text="scans.uploadSubtitle">또는 여기에 파일을 끌어다 놓으세요.</p>
                            <input type="file" id="file-upload" class="d-none" accept="image/png, image/jpeg, image/jpg, application/pdf"
                                onchange="handleFileUpload(event)">
                        </div>

                        <div id="preview-container" class="mt-3 d-none">
                            <img id="img-preview" src="" class="img-fluid rounded border mb-3"
                                style="max-height: 200px;">
                            <button class="btn btn-primary w-100" id="analyze-btn" onclick="startAnalysis()">
                                <i class="bi bi-magic me-2"></i><span data-text="scans.analyzeButton">AI 분석 시작하기</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="card p-4 h-100" id="result-card">
                        <div class="d-flex justify-content-center align-items-center h-100 text-center" id="result-empty">
                            <div>
                                <i class="bi bi-file-text display-1 text-soft opacity-50 mb-3"></i>
                                <h5 class="text-secondary" data-text="scans.emptyTitle">아직 분석된 문서가 없습니다.</h5>
                                <p class="text-soft small" data-text="scans.emptySubtitle">좌측에서 이미지를 업로드하고 분석을 시작하세요.</p>
                            </div>
                        </div>

                        <div id="result-content" class="d-none d-flex flex-column h-100">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="fw-bold text-primary-custom mb-0"><i class="bi bi-list-check me-2"></i><span data-text="scans.resultTitle">분석 결과</span></h5>
                                <span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3 py-2" data-text="scans.resultReady">확인 가능</span>
                            </div>

                            <div class="flex-grow-1 overflow-auto" id="analysis-text-container"></div>

                            <div class="mt-4 p-3 bg-light rounded" id="edit-section">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h6 class="fw-bold mb-0" data-text="scans.editTitle">분석 결과 수정</h6>
                                    <span class="small text-soft" data-text="scans.editSubtitle">날짜와 약품을 직접 다듬은 뒤 저장할 수 있습니다.</span>
                                </div>

                                <div id="analysis-warning" class="alert alert-warning small d-none"></div>

                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-secondary" data-text="scans.documentDate">문서 날짜</label>
                                    <input type="date" id="edit-document-date" class="form-control">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-secondary" data-text="scans.diagnosis">진단명</label>
                                    <div id="diagnosis-list-editor"></div>
                                    <button type="button" class="btn btn-outline-secondary btn-sm mt-1" onclick="addDiagnosisRow()">
                                        <i class="bi bi-plus-circle me-1"></i>진단명 추가
                                    </button>
                                </div>

                                <div class="mb-3 d-none" id="clinical-note-group">
                                    <label class="form-label small fw-bold text-secondary" data-text="scans.clinicalNote">진료 요약</label>
                                    <textarea id="edit-clinical-note" class="form-control" rows="4" data-placeholder="scans.clinicalNotePlaceholder" placeholder="진료기록지 내용을 정리해 입력하세요."></textarea>
                                </div>

                                <div class="mb-3" id="drug-editor-group">
                                    <label class="form-label small fw-bold text-secondary" data-text="scans.drugLabel">약품 목록</label>
                                    <div class="position-relative mb-2">
                                        <input type="text" id="drug-search-input" class="form-control" data-placeholder="scans.drugPlaceholder" placeholder="약 이름을 검색하세요. 예: 무스리">
                                        <div id="drug-suggestion-list" class="drug-suggestion-list d-none"></div>
                                    </div>
                                    <div id="selected-drugs"></div>
                                    <div class="form-text" data-text="scans.drugHelp">약품은 DB 검색 결과에서 선택해 추가합니다.</div>
                                </div>

                                <div class="d-flex gap-2 mt-4">
                                    <button class="btn btn-outline-primary flex-fill" id="refresh-result-btn" onclick="reloadResult()">
                                        <span data-text="scans.refreshButton">최신 결과 다시 불러오기</span>
                                    </button>
                                    <button class="btn btn-primary flex-fill" id="update-result-btn" onclick="updateResult()">
                                        <span data-text="scans.updateButton">수정 내용 반영</span>
                                    </button>
                                </div>
                            </div>

                            <div class="mt-4 pt-3 border-top">
                                <button class="btn btn-success w-100 py-2 fs-5 fw-bold shadow-sm" id="save-result-btn"
                                    onclick="saveResult()">
                                    <i class="bi bi-calendar-check me-2"></i><span data-text="scans.saveButton">내 복약 및 추천 목록에 적용하기</span>
                                </button>
                            </div>

                            <div id="save-result-summary" class="mt-3 d-none"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/texts.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>

    <script>
        let currentScanId = null;
        let currentScanResult = null;
        let selectedDrugs = [];  // Array of DrugEntry objects: {name, dose_count, dose_timing, dose_days, dose_amount, dose_unit}
        let drugSearchTimer = null;

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('show');
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function setWarning(message = '') {
            const warningBox = document.getElementById('analysis-warning');
            if (!message) {
                warningBox.classList.add('d-none');
                warningBox.innerText = '';
                return;
            }
            warningBox.innerText = message;
            warningBox.classList.remove('d-none');
        }

        function addDiagnosisRow(value = '') {
            const editor = document.getElementById('diagnosis-list-editor');
            const row = document.createElement('div');
            row.className = 'diagnosis-row';
            row.innerHTML = `<input type="text" class="form-control form-control-sm diagnosis-input" value="${escapeHtml(value)}" placeholder="진단명 입력">
                <button type="button" class="btn btn-outline-danger btn-sm" onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>`;
            editor.appendChild(row);
        }

        function getDiagnosisList() {
            return Array.from(document.querySelectorAll('.diagnosis-input'))
                .map(el => el.value.trim())
                .filter(v => v.length > 0);
        }

        function renderSelectedDrugs() {
            const container = document.getElementById('selected-drugs');
            container.innerHTML = '';

            if (selectedDrugs.length === 0) {
                container.innerHTML = `<span class="text-soft small">${getText('scans.noSelectedDrugs', '선택된 약품이 없습니다.')}</span>`;
                return;
            }

            selectedDrugs.forEach((drug, idx) => {
                const card = document.createElement('div');
                card.className = 'drug-entry-card';
                card.innerHTML = `
                    <div class="drug-entry-header">
                        <span class="fw-bold small">${escapeHtml(drug.name)}</span>
                        <button type="button" class="btn btn-outline-danger btn-sm py-0 px-1" onclick="removeDrug(${idx})"><i class="bi bi-x"></i></button>
                    </div>
                    <div class="dose-fields">
                        <div><label>1회 투여량</label><input type="text" class="form-control" value="${escapeHtml(drug.dose_amount || '')}" onchange="selectedDrugs[${idx}].dose_amount=this.value||null"></div>
                        <div><label>단위</label><input type="text" class="form-control" value="${escapeHtml(drug.dose_unit || '')}" placeholder="정, ml" onchange="selectedDrugs[${idx}].dose_unit=this.value||null"></div>
                        <div><label>1일 횟수</label><input type="number" class="form-control" value="${drug.dose_count ?? ''}" onchange="selectedDrugs[${idx}].dose_count=this.value?Number(this.value):null"></div>
                        <div><label>복용시점</label><input type="text" class="form-control" value="${escapeHtml(drug.dose_timing || '')}" placeholder="식후" onchange="selectedDrugs[${idx}].dose_timing=this.value||null"></div>
                        <div><label>투약일수</label><input type="number" class="form-control" value="${drug.dose_days ?? ''}" onchange="selectedDrugs[${idx}].dose_days=this.value?Number(this.value):null"></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function removeDrug(idx) {
            selectedDrugs.splice(idx, 1);
            renderSelectedDrugs();
        }

        function renderDrugSuggestions(items) {
            const list = document.getElementById('drug-suggestion-list');
            list.innerHTML = '';

            if (!items || items.length === 0) {
                list.classList.add('d-none');
                return;
            }

            items.forEach((item) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'drug-suggestion-item';
                button.innerHTML = `<div class="fw-bold">${escapeHtml(item.name)}</div><div class="small text-soft">${escapeHtml(item.manufacturer || getText('scans.noManufacturer', '제조사 정보 없음'))}</div>`;
                button.addEventListener('click', () => {
                    if (!selectedDrugs.some(d => d.name === item.name)) {
                        selectedDrugs.push({ name: item.name, dose_count: null, dose_timing: null, dose_days: null, dose_amount: null, dose_unit: null });
                        renderSelectedDrugs();
                    }
                    document.getElementById('drug-search-input').value = '';
                    list.classList.add('d-none');
                });
                list.appendChild(button);
            });

            list.classList.remove('d-none');
        }

        async function searchDrugs() {
            const keyword = document.getElementById('drug-search-input').value.trim();
            if (keyword.length < 2) {
                renderDrugSuggestions([]);
                return;
            }

            try {
                const items = await window.api.searchDrugs(keyword, 10);
                renderDrugSuggestions(items);
            } catch (err) {
                renderDrugSuggestions([]);
            }
        }

        function populateEditForm(res) {
            currentScanResult = res;
            document.getElementById('edit-document-date').value = res.document_date || '';
            document.getElementById('edit-clinical-note').value = res.clinical_note || '';

            // diagnosis_list
            const diagEditor = document.getElementById('diagnosis-list-editor');
            diagEditor.innerHTML = '';
            const diagList = res.diagnosis_list || (res.diagnosis ? [res.diagnosis] : []);
            if (diagList.length === 0) {
                addDiagnosisRow('');
            } else {
                diagList.forEach(d => addDiagnosisRow(d));
            }

            // drugs as DrugEntry objects
            selectedDrugs = Array.isArray(res.drugs) ? res.drugs.map(d =>
                typeof d === 'string'
                    ? { name: d, dose_count: null, dose_timing: null, dose_days: null, dose_amount: null, dose_unit: null }
                    : { name: d.name || '', dose_count: d.dose_count ?? null, dose_timing: d.dose_timing ?? null, dose_days: d.dose_days ?? null, dose_amount: d.dose_amount ?? null, dose_unit: d.dose_unit ?? null }
            ) : [];
            renderSelectedDrugs();

            const isMedicalRecord = res.document_type === 'medical_record';
            document.getElementById('clinical-note-group').classList.toggle('d-none', !isMedicalRecord);
            document.getElementById('drug-editor-group').classList.toggle('d-none', isMedicalRecord);
        }

        function renderAnalysisResult(res, warningMessage = '') {
            document.getElementById('result-empty').classList.add('d-none');
            document.getElementById('result-content').classList.remove('d-none');
            document.getElementById('save-result-summary').classList.add('d-none');
            document.getElementById('save-result-summary').innerHTML = '';
            setWarning(warningMessage);

            const txtBox = document.getElementById('analysis-text-container');
            let html = '';

            const diagList = res.diagnosis_list || (res.diagnosis ? [res.diagnosis] : []);
            const diagDisplay = diagList.length > 0 ? escapeHtml(diagList.join(', ')) : '-';

            if (res.document_type === 'prescription') {
                html += `<h6 class="fw-bold mb-3 p-2 bg-light rounded text-center">${getText('scans.extractedDrugTitle', '발견된 약품 정보')}</h6>`;
                if (res.drugs && res.drugs.length > 0) {
                    html += `<ul class="list-group mb-3 shadow-sm rounded">`;
                    res.drugs.forEach((drug) => {
                        const name = typeof drug === 'string' ? drug : drug.name;
                        let doseInfo = '';
                        if (typeof drug === 'object') {
                            const parts = [];
                            if (drug.dose_amount) parts.push(`${drug.dose_amount}${drug.dose_unit || ''}`);
                            if (drug.dose_count) parts.push(`1일 ${drug.dose_count}회`);
                            if (drug.dose_timing) parts.push(drug.dose_timing);
                            if (drug.dose_days) parts.push(`${drug.dose_days}일분`);
                            doseInfo = parts.length > 0 ? parts.join(' · ') : '';
                        }
                        html += `
                            <li class="list-group-item">
                                <span class="fw-bold">${escapeHtml(name)}</span>
                                ${doseInfo ? `<div class="small text-soft">${escapeHtml(doseInfo)}</div>` : ''}
                            </li>
                        `;
                    });
                    html += `</ul>`;
                } else {
                    html += `<p class="text-danger small">${getText('scans.noDrugsDetected', '인식된 약물이 없습니다. 아래에서 직접 선택해 주세요.')}</p>`;
                }
                html += `<div class="p-3 bg-light rounded shadow-sm mt-3">`;
                html += `<p class="mb-1"><span class="fw-bold">${getText('scans.documentDateLabel', '문서 날짜:')}</span> ${escapeHtml(res.document_date || '-')}</p>`;
                html += `<p class="mb-0"><span class="fw-bold">${getText('scans.diagnosisLabel', '진단명:')}</span> ${diagDisplay}</p>`;
                html += `</div>`;
            } else {
                html += `<div class="p-3 bg-light rounded shadow-sm">`;
                html += `<p class="mb-0 fw-bold">${getText('scans.rawTextTitle', '추출된 텍스트 요약:')}</p>`;
                html += `<p class="mt-2 small text-secondary m-0" style="white-space: pre-wrap;">${escapeHtml(res.raw_text || getText('scans.analysisFailed', '분석 실패'))}</p>`;
                html += `</div>`;
                html += `<div class="p-3 bg-light rounded shadow-sm mt-3">`;
                html += `<p class="mb-1"><span class="fw-bold">${getText('scans.documentDateLabel', '문서 날짜:')}</span> ${escapeHtml(res.document_date || '-')}</p>`;
                html += `<p class="mb-1"><span class="fw-bold">${getText('scans.diagnosisLabel', '진단명:')}</span> ${diagDisplay}</p>`;
                html += `<p class="mb-0"><span class="fw-bold">${getText('scans.clinicalNoteLabel', '진료 요약:')}</span> ${escapeHtml(res.clinical_note || '-')}</p>`;
                html += `</div>`;
            }

            txtBox.innerHTML = html;
            populateEditForm(res);
        }

        async function pollScanResult(scanId, options = {}) {
            const intervalMs = options.intervalMs ?? 1500;
            const maxAttempts = options.maxAttempts ?? 20;

            for (let attempt = 0; attempt < maxAttempts; attempt += 1) {
                const res = await window.api.getScanResult(scanId);
                const status = res.status || '';

                if (status === 'done' || status === 'failed') {
                    return res;
                }

                await new Promise((resolve) => setTimeout(resolve, intervalMs));
            }

            return await window.api.getScanResult(scanId);
        }

        async function reloadResult() {
            if (!currentScanId) return;
            const res = await window.api.getScanResult(currentScanId);
            renderAnalysisResult(res);
        }

        async function updateResult() {
            if (!currentScanId) return;

            const diagList = getDiagnosisList();
            const payload = {
                document_date: document.getElementById('edit-document-date').value || null,
                diagnosis_list: diagList.length > 0 ? diagList : null,
                clinical_note: document.getElementById('edit-clinical-note').value.trim() || null,
                drugs: document.getElementById('drug-editor-group').classList.contains('d-none') ? null : selectedDrugs,
            };

            try {
                const updated = await window.api.updateScanResult(currentScanId, payload);
                renderAnalysisResult(updated, getText('scans.resultUpdated', '수정한 내용이 반영되었습니다.'));
            } catch (err) {
                alert(getText('scans.updateError', '수정 반영 실패: ') + err.message);
            }
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('preview-container').classList.remove('d-none');
            }
            if (file.type.startsWith('image/')) {
                reader.readAsDataURL(file);
            } else {
                document.getElementById('img-preview').src = '';
                document.getElementById('preview-container').classList.remove('d-none');
            }

            const statusBox = document.getElementById('upload-status');
            const docType = document.getElementById('docType').value;
            statusBox.className = 'alert alert-info d-block small p-2 mb-3';
            statusBox.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> ${getText('scans.uploadLoading', '업로드 중...')}`;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('document_type', docType);

            try {
                const res = await window.api.uploadScan(formData);
                currentScanId = res.scan_id;
                currentScanResult = null;
                selectedDrugs = [];
                renderSelectedDrugs();
                setWarning('');

                statusBox.className = 'alert alert-success d-block small p-2 mb-3';
                statusBox.innerHTML = `<i class="bi bi-check-circle me-1"></i> ${getText('scans.uploadSuccess', '파일이 서버에 안전하게 업로드 되었습니다. 분석하거나 직접 수정할 수 있습니다.')}`;

                document.getElementById('result-empty').classList.add('d-none');
                document.getElementById('result-content').classList.remove('d-none');
                renderAnalysisResult({
                    document_type: docType,
                    document_date: null,
                    diagnosis_list: [],
                    clinical_note: null,
                    drugs: [],
                    raw_text: null,
                }, getText('scans.preEditWarning', '업로드는 완료되었습니다. OCR 분석 전에도 필요한 값을 직접 입력할 수 있습니다.'));
            } catch (err) {
                statusBox.className = 'alert alert-danger d-block small p-2 mb-3';
                statusBox.innerText = err.message;
                currentScanId = null;
            }
        }

        async function startAnalysis() {
            if (!currentScanId) {
                return alert(getText('scans.uploadFirst', '먼저 파일을 정상적으로 업로드해주세요.'));
            }

            const btn = document.getElementById('analyze-btn');
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>${getText('scans.analyzeActionLoading', 'AI가 꼼꼼히 읽고 있습니다...')}`;
            const existingStatus = currentScanResult?.status || '';

            if (existingStatus === 'processing') {
                setWarning(getText('scans.analysisAlreadyRunning', '이미 분석이 진행 중입니다. 새 요청을 보내지 않고 최신 결과를 다시 확인합니다.'));
            } else {
                setWarning(getText('scans.analysisPending', '분석을 시작했습니다. 완료될 때까지 잠시만 기다려 주세요.'));
            }

            try {
                if (existingStatus !== 'processing') {
                    await window.api.analyzeScan(currentScanId);
                }
                const res = await pollScanResult(currentScanId);

                if (res.status === 'done') {
                    renderAnalysisResult(res);
                } else if (res.status === 'failed') {
                    renderAnalysisResult(
                        res,
                        getText('scans.analysisFailedWithRetry', '분석에 실패했습니다. 아래 내용을 직접 수정한 뒤 저장할 수 있습니다.')
                    );
                } else {
                    renderAnalysisResult(
                        res,
                        getText('scans.analysisStillRunning', '분석이 아직 끝나지 않았습니다. 잠시 후 최신 결과를 다시 불러와 주세요.')
                    );
                }
            } catch (err) {
                const warningMessage = err.message;
                const friendlyWarning = warningMessage.includes('OCR 호출 한도를 초과')
                    || warningMessage.includes('OCR 서버 요청이 잠시 몰려')
                    ? getText('scans.ocrRateLimitHint', 'OCR 서버 요청이 몰려 있어 잠시 대기 중입니다. 몇 초 후 다시 결과를 확인해 주세요.')
                    : warningMessage;

                try {
                    const res = await window.api.getScanResult(currentScanId);
                    renderAnalysisResult(res, friendlyWarning);
                } catch (reloadErr) {
                    document.getElementById('result-empty').classList.add('d-none');
                    document.getElementById('result-content').classList.remove('d-none');
                    document.getElementById('analysis-text-container').innerHTML = `
                        <div class="alert alert-warning mb-0">
                            ${escapeHtml(getText('scans.analyzeErrorPrefix', '분석 중 오류가 발생했습니다.'))}<br>
                            ${escapeHtml(friendlyWarning)}
                        </div>
                    `;
                    setWarning(friendlyWarning);
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = currentScanResult?.status === 'processing'
                    ? getText('scans.refreshAnalyzeButton', '분석 결과 다시 확인하기')
                    : getText('scans.reanalyzeButton', '재분석 하기');
                btn.classList.add('btn-outline-primary');
                btn.classList.remove('btn-primary');
            }
        }

        async function saveResult() {
            if (!currentScanId) return;
            const btn = document.getElementById('save-result-btn');
            const summaryBox = document.getElementById('save-result-summary');

            try {
                btn.disabled = true;
                btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>${getText('scans.saveLoading', '저장 중...')}`;

                const saveResult = await window.api.saveScanResult(currentScanId);
                let recommendationSave = null;

                try {
                    await window.api.getRecommendationsForScan(currentScanId);
                    recommendationSave = await window.api.saveRecommendationsForScan(currentScanId);
                } catch (recErr) {
                    console.warn(getText('scans.recommendationSaveError', '추천 활성 저장 실패: ') + recErr.message);
                }

                const documentType = saveResult.document_type || currentScanResult?.document_type || document.getElementById('docType').value;
                const createdCount = Number(saveResult.created_count || 0);
                const skippedCount = Number(saveResult.skipped_count || 0);
                const skippedDuplicates = Array.isArray(saveResult.skipped_duplicates) ? saveResult.skipped_duplicates : [];
                const savedRecommendationCount = Number(recommendationSave?.saved_count || 0);

                let summaryHtml = `
                    <div class="alert alert-success mb-0">
                        <h6 class="fw-bold mb-2">${getText('scans.saveSummaryTitle', '저장 결과 안내')}</h6>
                        <p class="mb-2">${documentType === 'prescription'
                            ? getText('scans.prescriptionSavedTitle', '처방전 저장이 완료되었습니다.')
                            : getText('scans.recordSavedTitle', '진료기록 저장이 완료되었습니다.')}
                        </p>
                        <ul class="small mb-3 ps-3">
                `;

                if (documentType === 'prescription') {
                    summaryHtml += `<li>${getText('scans.createdCountLabel', '새로 생성된 복약 일정')}: ${createdCount}</li>`;
                    summaryHtml += `<li>${getText('scans.skippedCountLabel', '중복으로 건너뛴 약품')}: ${skippedCount}</li>`;
                    if (skippedDuplicates.length > 0) {
                        summaryHtml += `<li>${getText('scans.skippedListLabel', '중복 약품 목록')}: ${escapeHtml(skippedDuplicates.join(', '))}</li>`;
                    }
                }

                summaryHtml += `<li>${getText('scans.recommendationSavedLabel', '활성 추천 저장 건수')}: ${savedRecommendationCount}</li>`;
                summaryHtml += `</ul>`;

                if (savedRecommendationCount > 0) {
                    summaryHtml += `<p class="small mb-3">${getText('scans.recommendationReady', '추천도 함께 준비되었습니다.')}</p>`;
                } else {
                    summaryHtml += `<p class="small mb-3">${getText('scans.recommendationEmpty', '추천은 아직 활성 저장되지 않았습니다.')}</p>`;
                }

                summaryHtml += `<p class="small mb-3">${getText('scans.chatbotHint', '저장된 추천을 확인한 뒤 AI 상담에서 복약 질문까지 바로 이어갈 수 있습니다.')}</p>`;

                summaryHtml += `<div class="d-flex flex-wrap gap-2">`;
                if (documentType === 'prescription') {
                    summaryHtml += `<a href="medications.html" class="btn btn-success btn-sm">${getText('scans.goMedicationButton', '복약 관리로 이동')}</a>`;
                    summaryHtml += `<a href="recommendations.html" class="btn btn-outline-success btn-sm">${getText('scans.goRecommendationButton', 'AI 추천 보러 가기')}</a>`;
                    summaryHtml += `<a href="chatbot.html" class="btn btn-outline-primary btn-sm">${getText('scans.goChatbotButton', 'AI 상담으로 이어가기')}</a>`;
                } else {
                    summaryHtml += `<a href="health.html" class="btn btn-success btn-sm">${getText('scans.goHealthButton', '건강 기록 보러 가기')}</a>`;
                    summaryHtml += `<a href="recommendations.html" class="btn btn-outline-success btn-sm">${getText('scans.goRecommendationButton', 'AI 추천 보러 가기')}</a>`;
                    summaryHtml += `<a href="chatbot.html" class="btn btn-outline-primary btn-sm">${getText('scans.goChatbotButton', 'AI 상담으로 이어가기')}</a>`;
                }
                summaryHtml += `</div></div>`;

                summaryBox.innerHTML = summaryHtml;
                summaryBox.classList.remove('d-none');
                alert(getText('scans.scanSaveSuccess', '성공적으로 저장되었습니다! 복약 기록과 AI 추천 메뉴에서 내역을 확인할 수 있습니다.'));

            } catch (err) {
                alert(getText('scans.scanSaveError', '저장 실패: ') + err.message);
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-calendar-check me-2"></i>${getText('scans.saveButton', '내 복약 및 추천 목록에 적용하기')}`;
                return;
            }

            btn.disabled = false;
            btn.innerHTML = `<i class="bi bi-calendar-check me-2"></i>${getText('scans.saveButton', '내 복약 및 추천 목록에 적용하기')}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyTextBindings();
            document.title = getText('scans.title', document.title);
            renderSelectedDrugs();
        });
        document.getElementById('drug-search-input').addEventListener('input', () => {
            clearTimeout(drugSearchTimer);
            drugSearchTimer = setTimeout(searchDrugs, 250);
        });

        document.addEventListener('click', (event) => {
            const suggestionList = document.getElementById('drug-suggestion-list');
            const searchInput = document.getElementById('drug-search-input');
            if (!suggestionList.contains(event.target) && event.target !== searchInput) {
                suggestionList.classList.add('d-none');
            }
        });
    </script>
</body>

</html>
