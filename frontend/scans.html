<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>처방전 및 진단서 등록</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Mobile Menu Button -->
    <button class="btn btn-primary d-lg-none position-fixed top-0 end-0 m-3 z-3" type="button"
        onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>

    <div class="app-wrapper">
        <!-- Sidebar -->
        <nav id="sidebar-container" class="sidebar shadow-sm"></nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="fade-in mb-4 pb-2 border-bottom">
                <h3 class="fw-bold mb-0">처방전 자동 입력</h3>
                <p class="text-soft mt-1 mb-0">사진을 올리시면 AI가 약물 정보를 분석해 복약 일정에 자동으로 넣어드립니다.</p>
            </div>

            <div class="row g-4 fade-in">

                <!-- Upload Section -->
                <div class="col-md-5">
                    <div class="card p-4 h-100 text-center">
                        <h5 class="fw-bold text-primary-custom mb-3">새 처방전/기록 등록</h5>

                        <div id="upload-status" class="alert d-none small p-2 mb-3"></div>

                        <div class="mb-3 text-start">
                            <label class="form-label text-secondary small fw-bold">문서 종류 선택</label>
                            <select id="docType" class="form-select border-1 px-3 py-2 bg-light">
                                <option value="prescription">처방전 (약국 봉투)</option>
                                <option value="medical_record">진단서/소견서</option>
                            </select>
                        </div>

                        <div class="upload-area p-4 mt-2" onclick="document.getElementById('file-upload').click()">
                            <i class="bi bi-cloud-arrow-up display-3 text-primary-custom mb-2"></i>
                            <h6 class="fw-bold mb-1">이미지 선택하기</h6>
                            <p class="small text-soft mb-0">또는 여기에 파일을 끌어다 놓으세요.</p>
                            <input type="file" id="file-upload" class="d-none" accept="image/png, image/jpeg, image/jpg"
                                onchange="handleFileUpload(event)">
                        </div>

                        <div id="preview-container" class="mt-3 d-none">
                            <img id="img-preview" src="" class="img-fluid rounded border mb-3"
                                style="max-height: 200px;">
                            <button class="btn btn-primary w-100" id="analyze-btn" onclick="startAnalysis()">
                                <i class="bi bi-magic me-2"></i>AI 분석 시작하기
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Result Section -->
                <div class="col-md-7">
                    <div class="card p-4 h-100" id="result-card">
                        <div class="d-flex justify-content-center align-items-center h-100 text-center"
                            id="result-empty">
                            <div>
                                <i class="bi bi-file-text display-1 text-soft opacity-50 mb-3"></i>
                                <h5 class="text-secondary">아직 분석된 문서가 없습니다.</h5>
                                <p class="text-soft small">좌측에서 이미지를 업로드하고 분석을 시작하세요.</p>
                            </div>
                        </div>

                        <div id="result-content" class="d-none d-flex flex-column h-100">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="fw-bold text-primary-custom mb-0"><i class="bi bi-list-check me-2"></i>분석 완료!
                                </h5>
                                <span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3 py-2">분석
                                    성공</span>
                            </div>

                            <div class="flex-grow-1 overflow-auto" id="analysis-text-container">
                                <!-- Dynamic analysis result -->
                            </div>

                            <div class="mt-4 pt-3 border-top">
                                <!-- If prescription -> Save schedule button -->
                                <button class="btn btn-success w-100 py-2 fs-5 fw-bold shadow-sm" id="save-result-btn"
                                    onclick="saveResult()">
                                    <i class="bi bi-calendar-check me-2"></i>내 복약 및 추천 목록에 적용하기
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>

    <script>
        let currentScanId = null;

        function toggleSidebar() { document.querySelector('.sidebar').classList.toggle('show'); }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Preview rendering
            const reader = new FileReader();
            reader.onload = function (e) {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('preview-container').classList.remove('d-none');
            }
            reader.readAsDataURL(file);

            // Upload to server mapping
            const statusBox = document.getElementById('upload-status');
            const docType = document.getElementById('docType').value;
            statusBox.className = 'alert alert-info d-block small p-2 mb-3';
            statusBox.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> 업로드 중...';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('document_type', docType);

            try {
                const res = await window.api.uploadScan(formData);
                currentScanId = res.id;

                statusBox.className = 'alert alert-success d-block small p-2 mb-3';
                statusBox.innerHTML = '<i class="bi bi-check-circle me-1"></i> 파일이 서버에 안전하게 업로드 되었습니다. AI 분석을 시작해주세요.';

                // Reset right panel
                document.getElementById('result-empty').classList.remove('d-none');
                document.getElementById('result-content').classList.add('d-none');

            } catch (err) {
                statusBox.className = 'alert alert-danger d-block small p-2 mb-3';
                statusBox.innerText = err.message;
                currentScanId = null;
            }
        }

        async function startAnalysis() {
            if (!currentScanId) return alert('먼저 파일을 정상적으로 업로드해주세요.');

            const btn = document.getElementById('analyze-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>AI가 꼼꼼히 읽고 있습니다...';

            try {
                const res = await window.api.analyzeScan(currentScanId);

                // switch view
                document.getElementById('result-empty').classList.add('d-none');
                document.getElementById('result-content').classList.remove('d-none');

                const txtBox = document.getElementById('analysis-text-container');

                // Render Result
                let html = '';
                if (res.document_type === 'prescription' && res.parsed_data) {
                    const data = res.parsed_data;
                    html += `<h6 class="fw-bold mb-3 p-2 bg-light rounded text-center">발견된 약품 정보</h6>`;
                    if (data.drugs && data.drugs.length > 0) {
                        html += `<ul class="list-group mb-3 shadow-sm rounded">`;
                        data.drugs.forEach(d => {
                            html += `
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <div>
                                <span class="fw-bold">${d.drug_name}</span>
                                <div class="small text-soft">1회 <span class="text-primary-custom fw-bold">${d.amount}</span>투여 x 1일 <span class="text-primary-custom fw-bold">${d.times_per_day}</span>회, 총 <span class="text-primary-custom fw-bold">${d.duration_days}</span>일</div>
                            </div>
                        </li>
                        `;
                        });
                        html += `</ul>`;
                    } else {
                        html += `<p class="text-danger small">인식된 약물이 없습니다.</p>`;
                    }
                } else {
                    html += `<div class="p-3 bg-light rounded shadow-sm">
                   <p class="mb-0 fw-bold">추출된 테스트 요약:</p>
                   <p class="mt-2 small text-secondary m-0" style="white-space: pre-wrap;">${res.raw_text || '분석 실패'}</p>
                </div>`;
                }

                txtBox.innerHTML = html;

            } catch (err) {
                alert('분석 중 오류 발생: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-magic me-2"></i>AI 분석 시작하기';
                btn.classList.add('btn-outline-primary');
                btn.classList.remove('btn-primary');
                btn.innerText = '재분석 하기';
            }
        }

        async function saveResult() {
            if (!currentScanId) return;
            const btn = document.getElementById('save-result-btn');

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>저장 중...';

                await window.api.saveScanResult(currentScanId);

                alert('성공적으로 저장되었습니다! 복약 기록과 AI 추천 메뉴에서 내역을 확인할 수 있습니다.');
                window.location.href = 'medications.html';

            } catch (err) {
                alert('저장 실패: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-calendar-check me-2"></i>내 복약 및 추천 목록에 적용하기';
            }
        }
    </script>
</body>

</html>
