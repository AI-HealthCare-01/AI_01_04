<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-text="scans.title">새 문서 등록 - MEDIMATE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="top-header d-flex justify-content-between align-items-center sticky-top">
  <div class="brand d-flex align-items-center gap-2">
    <i class="bi bi-activity"></i> MEDIMATE
    <span style="font-weight:400;color:#999;font-size:.78rem;margin-left:6px" data-text="common.serviceTagline">당신의 곁에, 언제나</span>
  </div>
  <div class="user-area d-flex align-items-center gap-3">
    <span class="text-muted" id="header-user-name">환영합니다</span>
    <a href="profile.html" class="btn btn-myinfo"><i class="bi bi-person-fill me-1"></i>내 정보</a>
  </div>
</nav>

<div class="dashboard-card">
  <div class="mb-1">
    <div class="hero-label"><i class="bi bi-activity me-1"></i>MEDIMATE</div>
    <div class="hero-title">새 문서 등록</div>
    <p class="hero-desc" id="hero-desc">처방전이나 진단서를 업로드하면 AI가 분석하여 복약 일정과 건강 관리 목표를 자동으로 생성합니다.</p>
  </div>

  <div class="dashboard-tabs">
    <a href="profile.html"><i class="bi bi-person me-1"></i>내 프로필</a>
    <a href="dashboard.html"><i class="bi bi-grid-1x2 me-1"></i>대시보드</a>
    <a href="scans.html" class="active"><i class="bi bi-file-earmark-plus me-1"></i>새 문서 등록</a>
    <a href="medications.html"><i class="bi bi-capsule me-1"></i>복용 관리 이력</a>
    <a href="health.html"><i class="bi bi-heart-pulse me-1"></i>건강 관리 이력</a>
    <a href="chatbot.html"><i class="bi bi-chat-dots me-1"></i>AI 챗봇</a>
  </div>

  <div id="upload-status" class="alert d-none small p-2 mb-3"></div>

  <select id="docType" class="doc-type-select">
    <option value="prescription">처방전 (약국 봉투)</option>
    <option value="medical_record">진단서/소견서</option>
  </select>

  <div class="scan-upload-zone" id="upload-zone" onclick="document.getElementById('file-upload').click()"
       ondragover="event.preventDefault();this.classList.add('dragover')"
       ondragleave="this.classList.remove('dragover')"
       ondrop="event.preventDefault();this.classList.remove('dragover');handleDropUpload(event)">
    <i class="bi bi-cloud-arrow-up"></i>
    <h6>이미지 선택하기</h6>
    <p>또는 여기에 파일을 끌어다 놓으세요.</p>
    <input type="file" id="file-upload" class="d-none" accept="image/png,image/jpeg,image/jpg,application/pdf" onchange="handleFileUpload(event)">
  </div>

  <div id="file-info-box" class="scan-file-info d-none">
    <div class="file-name"><i class="bi bi-file-earmark-image"></i> <span id="file-name-text"></span> <span id="file-size-text" class="text-muted" style="font-size:.8rem;margin-left:8px"></span></div>
    <button class="remove-btn" onclick="removeFile()"><i class="bi bi-x-lg"></i></button>
  </div>

  <button class="btn-analyze d-none" id="retry-upload-btn" onclick="retryUpload()">
    <i class="bi bi-arrow-clockwise me-2"></i>다시 업로드하기
  </button>

  <button class="btn-analyze d-none" id="analyze-btn" onclick="startAnalysis()">
    <i class="bi bi-magic me-2"></i>AI 분석 시작하기
  </button>
</div>

<script src="js/utils.js"></script>
<script src="js/texts.js"></script>
<script src="js/api.js"></script>
<script src="js/chat-widget.js"></script>
<script>
const DEMO_MODE = !localStorage.getItem('access_token') || new URLSearchParams(location.search).has('demo');
if (!DEMO_MODE && !localStorage.getItem('access_token')) window.location.href = 'index.html';

let currentScanId = null;
let lastFile = null;
let lastDocType = null;

function setStatus(msg, type='info') {
  const el = document.getElementById('upload-status');
  if (!msg) { el.className = 'alert d-none small p-2 mb-3'; return; }
  el.className = `alert alert-${type} d-block small p-2 mb-3`;
  el.innerHTML = msg;
}

function showFileInfo(file) {
  document.getElementById('file-name-text').textContent = file.name;
  const sizeKB = file.size / 1024;
  document.getElementById('file-size-text').textContent = sizeKB >= 1024 ? (sizeKB/1024).toFixed(1)+'MB' : sizeKB.toFixed(1)+'KB';
  document.getElementById('file-info-box').classList.remove('d-none');
}

function removeFile() {
  document.getElementById('file-upload').value = '';
  document.getElementById('file-info-box').classList.add('d-none');
  document.getElementById('analyze-btn').classList.add('d-none');
  document.getElementById('retry-upload-btn').classList.add('d-none');
  setStatus('');
  currentScanId = null;
  lastFile = null;
}

function retryUpload() {
  if (!lastFile) return;
  setStatus('<span class="spinner-border spinner-border-sm me-2"></span>업로드 중...', 'info');
  uploadFile(lastFile, lastDocType || document.getElementById('docType').value);
}

async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  showFileInfo(file);
  setStatus('<span class="spinner-border spinner-border-sm me-2"></span>업로드 중...', 'info');
  await uploadFile(file, document.getElementById('docType').value);
}

function handleDropUpload(event) {
  const file = event.dataTransfer.files[0];
  if (!file) return;
  if (!['image/png','image/jpeg','image/jpg','application/pdf'].includes(file.type)) { setStatus('JPG, PNG, PDF 파일만 업로드 가능합니다.', 'danger'); return; }
  if (file.size > 10*1024*1024) { setStatus('10MB 이하 파일만 업로드 가능합니다.', 'danger'); return; }
  showFileInfo(file);
  setStatus('<span class="spinner-border spinner-border-sm me-2"></span>업로드 중...', 'info');
  uploadFile(file, document.getElementById('docType').value);
}

async function uploadFile(file, docType) {
  lastFile = file;
  lastDocType = docType;
  document.getElementById('analyze-btn').classList.add('d-none');
  document.getElementById('retry-upload-btn').classList.add('d-none');

  if (DEMO_MODE) {
    currentScanId = 'demo';
    setStatus('<i class="bi bi-check-circle me-1"></i>업로드 완료! 분석을 시작하세요. <span class="badge bg-warning text-dark ms-1">데모</span>', 'success');
    document.getElementById('analyze-btn').classList.remove('d-none');
    return;
  }

  const formData = new FormData();
  formData.append('file', file);
  formData.append('document_type', docType);
  try {
    const res = await window.api.uploadScan(formData);
    currentScanId = res.scan_id;
    setStatus('<i class="bi bi-check-circle me-1"></i>업로드 완료! 분석을 시작하세요.', 'success');
    document.getElementById('analyze-btn').classList.remove('d-none');
  } catch (err) {
    setStatus(err.message + ' 다시 시도해 주세요.', 'danger');
    currentScanId = null;
    document.getElementById('retry-upload-btn').classList.remove('d-none');
  }
}

async function startAnalysis() {
  if (!currentScanId) return alert('먼저 파일을 업로드해주세요.');
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>AI가 분석 중입니다...';

  if (DEMO_MODE) {
    await new Promise(r => setTimeout(r, 1200));
    window.location.href = 'scan_result.html?demo';
    return;
  }

  try {
    await window.api.analyzeScan(currentScanId);
    // poll until done
    for (let i = 0; i < 20; i++) {
      const res = await window.api.getScanResult(currentScanId);
      if (res.status === 'done' || res.status === 'failed') break;
      await new Promise(r => setTimeout(r, 1500));
    }
    window.location.href = 'scan_result.html?scan_id=' + currentScanId;
  } catch (err) {
    // 분석 실패해도 결과 페이지로 이동 (수동 입력 가능)
    window.location.href = 'scan_result.html?scan_id=' + currentScanId + '&error=1';
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  applyTextBindings();
  if (DEMO_MODE) {
    document.getElementById('header-user-name').textContent = '환영합니다, 김환자님';
    return;
  }
  try {
    const user = await window.api.getUserMe();
    document.getElementById('header-user-name').textContent = '환영합니다, ' + (user.name||'사용자') + '님';
  } catch {}
});
</script>
</body>
</html>
