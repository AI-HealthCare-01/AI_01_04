<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>당신의 건강을 기원합니다 - 대시보드</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        .top-nav {
            background-color: var(--card-bg);
            border-bottom: 1px solid #eef2f0;
            padding: 1rem;
        }
        .stat-badge {
            font-size: 0.75rem;
            padding: 0.3rem 0.75rem;
            border-radius: 999px;
        }
        .rec-card {
            border-left: 3px solid var(--primary-color);
            background: #f7faf8;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        .medication-check-item {
            display: flex;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .medication-check-item.done {
            background-color: #f0fdf4 !important;
            border: 1px solid #bbf7d0 !important;
        }

        .medication-check-item.pending {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
        }

        .medication-check-item:hover {
            border-color: var(--primary-color);
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 3px 6px;
        }
    </style>
</head>

<body>

    <!-- Global Sidebar Container -->
    <div id="sidebar-container"></div>
    <!-- Main Content Dashboard -->
    <div class="container py-4">
        <div class="row g-4">

            <!-- Top Left: User Profile -->
            <div class="col-md-5 col-lg-4 fade-in" style="animation-delay: 0.1s;">
                <div class="card p-4 h-100">
                    <div class="d-flex align-items-center mb-3">
                        <img id="profile-img"
                            src="https://ui-avatars.com/api/?name=사용자&background=6da285&color=fff&size=80"
                            alt="프로필" class="profile-img-lg me-3 shadow-sm">
                        <div>
                            <h5 class="mb-1 text-primary-custom fw-bold" id="profile-name">불러오는 중...</h5>
                            <p class="text-soft mb-0 small"><i class="bi bi-person me-1"></i><span id="profile-gender">-</span></p>
                            <p class="text-soft mb-0 small"><i class="bi bi-calendar-event me-1"></i><span id="profile-birthday">-</span></p>
                        </div>
                    </div>
                    <hr class="text-muted opacity-25">
                    <div class="row text-center my-2">
                        <div class="col">
                            <h6 class="fw-bold mb-1" id="stat-medication">
                                <span class="spinner-border spinner-border-sm text-primary" role="status"></span>
                            </h6>
                            <span class="text-soft small">남은 복약일</span>
                        </div>
                        <div class="col border-start">
                            <h6 class="fw-bold mb-1" id="stat-today-med">-</h6>
                            <span class="text-soft small">오늘 복약</span>
                        </div>
                    </div>
                    <a href="profile.html" class="btn btn-outline-primary btn-sm w-100 mt-3 rounded-pill">상세 정보 수정</a>
                </div>
            </div>

            <!-- Top Right: Recent Prescription & Today Status -->
            <div class="col-md-7 col-lg-8 fade-in" style="animation-delay: 0.2s;">
                <div class="card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold text-primary-custom mb-0"><i class="bi bi-capsule me-2"></i>오늘의 건강 현황</h5>
                        <div id="health-status-badges" class="d-flex gap-2"></div>
                    </div>

                    <!-- Today's Medication Details -->
                    <div class="mb-4">
                        <p class="text-soft small mb-2 fw-medium">오늘의 복약 일정</p>
                        <div id="today-medication-list" class="d-flex flex-column gap-2">
                            <div class="text-center text-soft small py-2">
                                <span class="spinner-border spinner-border-sm" role="status"></span>
                                불러오는 중...
                            </div>
                        </div>
                    </div>

                    <hr class="my-3 opacity-25">

                    <!-- Recent Prescription -->
                    <div id="recent-prescription-area">
                        <p class="text-soft small mb-2 fw-medium">최근 처방전</p>
                        <div id="recent-prescription" class="text-soft small">불러오는 중...</div>
                    </div>

                    <hr class="my-3 opacity-25">

                    <!-- Active Recommendations -->
                    <div>
                        <p class="text-soft small mb-2 fw-medium">활성 건강 추천</p>
                        <div id="active-recommendations">
                            <div class="text-center text-soft small py-2">
                                <span class="spinner-border spinner-border-sm" role="status"></span>
                                불러오는 중...
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom: Scan Upload shortcut -->
            <div class="col-12 fade-in" style="animation-delay: 0.3s;">
                <div class="card p-4">
                    <div class="mb-3">
                        <h5 class="fw-bold text-primary-custom mb-1"><i class="bi bi-camera me-2"></i>처방전 및 관련 자료 업로드
                            <span class="text-soft fs-6 fw-normal">(선택)</span></h5>
                        <p class="text-soft small mb-0">진료 보신 서류나 약 봉투를 찍어 올리시면 일정을 분석해드립니다.</p>
                    </div>

                    <div class="upload-area mt-2" onclick="window.location.href='scans.html'" style="cursor:pointer;">
                        <i class="bi bi-cloud-arrow-up display-4 text-primary-custom mb-2"></i>
                        <h6 class="fw-bold">클릭하여 처방전 등록하기</h6>
                        <p class="small text-soft">PNG, JPG, PDF 파일을 지원합니다.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components.js"></script>
    <script src="js/api.js"></script>
    <script>
        // 인증 체크
        if (!localStorage.getItem('access_token')) {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_name');
            window.location.href = 'index.html';
        }

        function formatGender(g) {
            if (g === 'MALE') return '남성';
            if (g === 'FEMALE') return '여성';
            return '-';
        }

        function formatBirthday(b) {
            if (!b) return '-';
            return b.replace(/-/g, '.');
        }

        function renderRecommendations(items) {
            const el = document.getElementById('active-recommendations');
            if (!items || items.length === 0) {
                el.innerHTML = '<p class="text-soft small mb-0">아직 활성 추천이 없습니다. 처방전을 등록해보세요.</p>';
                return;
            }
            const typeLabel = { lifestyle: '생활관리', medication: '복약', warning: '주의', followup: '추적관찰' };
            el.innerHTML = items.slice(0, 3).map(r =>
                `<div class="rec-card">${escapeHtml(typeLabel[r.recommendation_type] || r.recommendation_type)} · ${escapeHtml(r.content)}</div>`
            ).join('');
            if (items.length > 3) {
                el.innerHTML += `<a href="recommendations.html" class="small text-primary-custom">+${items.length - 3}개 더 보기</a>`;
            }
        }

        function renderPrescription(rx) {
            const el = document.getElementById('recent-prescription');
            if (!rx) {
                el.innerHTML = '<span class="text-soft">등록된 처방전이 없습니다.</span>';
                return;
            }
            el.innerHTML = `
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <span class="badge bg-soft-primary text-primary-custom">${escapeHtml(rx.disease_name || '질환명 없음')}</span>
                    <span class="text-dark fw-medium">${escapeHtml(rx.drug_name || '-')}</span>
                    <span class="text-soft">${escapeHtml(rx.start_date || '')} ~ ${escapeHtml(rx.end_date || '')}</span>
                    <span class="text-soft">1일 ${rx.dose_count || 1}회</span>
                </div>`;
        }

        async function toggleMedication(logId, currentStatus, elId) {
            const checkbox = document.getElementById(elId);
            const newItem = document.getElementById(`item-${logId}`);
            const newStatus = currentStatus === 'taken' ? 'skipped' : 'taken';

            try {
                checkbox.disabled = true;
                await window.api.updateMedicationLog(logId, newStatus);

                if (newStatus === 'taken') {
                    newItem.classList.remove('pending');
                    newItem.classList.add('done');
                    checkbox.checked = true;
                    newItem.querySelector('.med-title').classList.add('text-muted', 'text-decoration-line-through');
                    newItem.querySelector('.med-title').classList.remove('text-dark');
                    const badge = newItem.querySelector('.status-badge');
                    badge.className = 'badge bg-success bg-opacity-10 text-success rounded-pill status-badge float-end';
                    badge.innerText = '복용 완료';
                } else {
                    newItem.classList.remove('done');
                    newItem.classList.add('pending');
                    checkbox.checked = false;
                    newItem.querySelector('.med-title').classList.remove('text-muted', 'text-decoration-line-through');
                    newItem.querySelector('.med-title').classList.add('text-dark');
                    const badge = newItem.querySelector('.status-badge');
                    badge.className = 'badge bg-danger bg-opacity-10 text-danger rounded-pill status-badge float-end';
                    badge.innerText = '미복용';
                }

                newItem.dataset.status = newStatus;
                loadDashboardSummaryOnly();
            } catch (err) {
                alert('업데이트 중 오류가 발생했습니다: ' + err.message);
                checkbox.checked = currentStatus === 'taken';
            } finally {
                checkbox.disabled = false;
            }
        }

        async function loadTodayMedications() {
            const container = document.getElementById('today-medication-list');
            try {
                const today = new Date();
                const offset = today.getTimezoneOffset() * 60000;
                const localISOTime = (new Date(today - offset)).toISOString().split('T')[0];

                const day = await window.api.fetchAPI(`/medications/history/${localISOTime}`);
                if (!day.items || day.items.length === 0) {
                    container.innerHTML = `<div class="text-soft small">오늘 등록된 복약 일정이 없습니다. 처방전을 먼저 등록해보세요.</div>`;
                    return;
                }

                let html = '';
                day.items.forEach(log => {
                    const isDone = log.status === 'taken';
                    const mainClass = isDone ? 'done' : 'pending';
                    const elId = `chk-${log.id}`;
                    const titleColor = isDone ? 'text-muted text-decoration-line-through' : 'text-dark';
                    const badgeHtml = isDone
                        ? `<span class="badge bg-success bg-opacity-10 text-success rounded-pill status-badge float-end">복용 완료</span>`
                        : `<span class="badge bg-danger bg-opacity-10 text-danger rounded-pill status-badge float-end">미복용</span>`;

                    html += `
                        <div class="medication-check-item ${mainClass} p-2" id="item-${log.id}" data-log-id="${log.id}" data-status="${escapeHtml(log.status)}" data-el-id="${elId}" onclick="toggleMedication(${log.id}, this.dataset.status, '${elId}')">
                            <div class="form-check m-0 me-2" style="pointer-events: none;">
                                <input class="form-check-input" type="checkbox" id="${elId}" ${isDone ? 'checked' : ''}>
                            </div>
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <span class="fw-bold med-title ${titleColor}" style="font-size:0.85rem">${escapeHtml(log.label)}</span>
                                    ${badgeHtml}
                                </div>
                                <div class="text-soft small d-flex gap-2" style="font-size:0.75rem">
                                   <span><i class="bi bi-clock me-1"></i>${escapeHtml(log.intake_datetime || '시간 없음')}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = '<div class="text-soft small text-danger">복약 일정을 가져오지 못했습니다.</div>';
            }
        }

        async function loadDashboardSummaryOnly() {
            try {
                const summary = await window.api.getDashboardSummary();
                document.getElementById('stat-medication').textContent = (summary.remaining_medication_days ?? 0) + '일';
                document.getElementById('stat-today-med').textContent = summary.today_medication_completed ? '완료 ✓' : '미완료';
                document.getElementById('stat-today-med').className = 'fw-bold mb-1 ' + (summary.today_medication_completed ? 'text-success' : 'text-danger');
                document.getElementById('health-status-badges').innerHTML = `
                    <span class="stat-badge ${summary.today_medication_completed ? 'bg-success text-white' : 'bg-warning text-dark'}">
                        복약 ${summary.today_medication_completed ? '완료' : '미완료'}
                    </span>
                    <span class="stat-badge ${summary.today_health_completed ? 'bg-success text-white' : 'bg-secondary text-white'}">
                        건강관리 ${summary.today_health_completed ? '완료' : '미완료'}
                    </span>`;
            } catch (e) {}
        }

        async function loadDashboard() {
            try {
                // 사용자 정보 로드
                const user = await window.api.getUserMe();
                const name = user.name || '사용자';
                document.getElementById('profile-name').textContent = name + ' 님';
                document.getElementById('profile-gender').textContent = formatGender(user.gender);
                document.getElementById('profile-birthday').textContent = formatBirthday(user.birthday);
                document.getElementById('menu-user-name').textContent = name + ' 님';

                // 프로필 이미지
                const imgUrl = user.profile_image_url
                    ? window.api.resolveBackendUrl(user.profile_image_url)
                    : `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6da285&color=fff&size=80`;
                document.getElementById('profile-img').src = imgUrl;
                document.getElementById('menu-profile-img').src = imgUrl.replace('size=80', 'size=48');

                localStorage.setItem('user_name', name);
            } catch (e) {
                document.getElementById('profile-name').textContent = localStorage.getItem('user_name') || '사용자';
            }

            try {
                // 대시보드 요약 로드
                const summary = await window.api.getDashboardSummary();

                // 남은 복약일
                document.getElementById('stat-medication').textContent = (summary.remaining_medication_days ?? 0) + '일';

                // 오늘 복약 완료 여부
                document.getElementById('stat-today-med').textContent = summary.today_medication_completed ? '완료 ✓' : '미완료';
                document.getElementById('stat-today-med').className = 'fw-bold mb-1 ' + (summary.today_medication_completed ? 'text-success' : 'text-danger');

                // 상태 배지
                const badgesEl = document.getElementById('health-status-badges');
                badgesEl.innerHTML = `
                    <span class="stat-badge ${summary.today_medication_completed ? 'bg-success text-white' : 'bg-warning text-dark'}">
                        복약 ${summary.today_medication_completed ? '완료' : '미완료'}
                    </span>
                    <span class="stat-badge ${summary.today_health_completed ? 'bg-success text-white' : 'bg-secondary text-white'}">
                        건강관리 ${summary.today_health_completed ? '완료' : '미완료'}
                    </span>`;

                // 최근 처방전
                renderPrescription(summary.recent_prescription);

                // 활성 추천
                renderRecommendations(summary.active_recommendations);

                // 오늘의 복약 목록 조회 (New)
                await loadTodayMedications();

            } catch (e) {
                document.getElementById('stat-medication').textContent = '-';
                document.getElementById('recent-prescription').textContent = '데이터를 불러올 수 없습니다.';
                document.getElementById('active-recommendations').innerHTML = '<p class="text-soft small">데이터를 불러올 수 없습니다.</p>';
            }

            // 오늘의 복약 목록 조회 (New)
            await loadTodayMedications();
        }

        loadDashboard();
    </script>
</body>

</html>
