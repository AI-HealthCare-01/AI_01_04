<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>당신의 건강을 기원합니다 - 대시보드</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        .top-nav {
            background-color: var(--card-bg);
            border-bottom: 1px solid #eef2f0;
            padding: 1rem;
        }
    </style>
</head>

<body>

    <!-- Top Navigation -->
    <nav class="top-nav d-flex justify-content-between align-items-center shadow-sm sticky-top">
        <!-- Empty left space to push menu icon to right -->
        <div class="h5 mb-0 fw-bold text-primary-custom">HealthCare AI</div>

        <!-- Right side Menu Button -->
        <button class="btn btn-outline-primary border-0 fs-4 py-0" type="button" data-bs-toggle="offcanvas"
            data-bs-target="#rightMenu" aria-controls="rightMenu">
            <i class="bi bi-list"></i>
        </button>
    </nav>

    <!-- Main Content Dashboard -->
    <div class="container py-4">
        <div class="row g-4">

            <!-- Top Left: User Profile -->
            <div class="col-md-5 col-lg-4 fade-in" style="animation-delay: 0.1s;">
                <div class="card p-4 h-100">
                    <div class="d-flex align-items-center mb-3">
                        <img src="https://ui-avatars.com/api/?name=홍길동&background=random&color=fff&size=80" alt="프로필"
                            class="profile-img-lg me-3 shadow-sm">
                        <div>
                            <h5 class="mb-1 text-primary-custom fw-bold">홍길동 님</h5>
                            <p class="text-soft mb-0 small"><i class="bi bi-droplet me-1"></i>O형 (Rh+)</p>
                            <p class="text-soft mb-0 small"><i class="bi bi-calendar-event me-1"></i>1980.05.12</p>
                        </div>
                    </div>
                    <hr class="text-muted opacity-25">
                    <div class="row text-center my-2">
                        <div class="col">
                            <h6 class="fw-bold mb-1">165</h6>
                            <span class="text-soft small">키 (cm)</span>
                        </div>
                        <div class="col border-start">
                            <h6 class="fw-bold mb-1">68</h6>
                            <span class="text-soft small">체중 (kg)</span>
                        </div>
                    </div>
                    <button class="btn btn-outline-primary btn-sm w-100 mt-3 rounded-pill">상세 정보 수정</button>
                </div>
            </div>

            <!-- Top Right: Medication Record -->
            <div class="col-md-7 col-lg-8 fade-in" style="animation-delay: 0.2s;">
                <div class="card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold text-primary-custom mb-0"><i class="bi bi-capsule me-2"></i>오늘의 복약 기록</h5>
                        <span class="badge bg-soft-primary text-primary-custom px-3 py-2 rounded-pill">진행률 66%</span>
                    </div>
                    <div class="medication-list mt-2">
                        <!-- Item 1 (Done) -->
                        <div class="medication-check-item">
                            <div class="form-check fs-5">
                                <input class="form-check-input" type="checkbox" checked id="pill1">
                                <label class="form-check-label ms-2 d-flex flex-column" for="pill1">
                                    <span class="fw-bold fs-6 text-dark">고혈압 약 (아침 식후 30분)</span>
                                    <span class="text-soft fs-6 small">AM 08:30 완료</span>
                                </label>
                            </div>
                        </div>
                        <!-- Item 2 (Done) -->
                        <div class="medication-check-item">
                            <div class="form-check fs-5">
                                <input class="form-check-input" type="checkbox" checked id="pill2">
                                <label class="form-check-label ms-2 d-flex flex-column" for="pill2">
                                    <span class="fw-bold fs-6 text-dark">비타민 C (점심 필수)</span>
                                    <span class="text-soft fs-6 small">PM 01:00 완료</span>
                                </label>
                            </div>
                        </div>
                        <!-- Item 3 (Pending) -->
                        <div class="medication-check-item bg-white border border-light shadow-sm">
                            <div class="form-check fs-5">
                                <input class="form-check-input" type="checkbox" id="pill3">
                                <label class="form-check-label ms-2 d-flex flex-column text-danger" for="pill3">
                                    <span class="fw-bold fs-6">저녁 당뇨 약 (저녁 식후 당장복용요망)</span>
                                    <span class="text-secondary fs-6 small">미복용 상태</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Long: Image Upload -->
            <div class="col-12 fade-in" style="animation-delay: 0.3s;">
                <div class="card p-4">
                    <div class="mb-3">
                        <h5 class="fw-bold text-primary-custom mb-1"><i class="bi bi-camera me-2"></i>처방전 및 관련 자료 업로드
                            <span class="text-soft fs-6 fw-normal">(선택)</span></h5>
                        <p class="text-soft small mb-0">진료 보신 서류나 약 봉투를 찍어 올리시면 일정을 분석해드립니다.</p>
                    </div>

                    <div class="upload-area mt-2" onclick="document.getElementById('file-upload').click()">
                        <i class="bi bi-cloud-arrow-up display-4 text-primary-custom mb-2"></i>
                        <h6 class="fw-bold">클릭하여 사진 등록</h6>
                        <p class="small text-soft">PNG, JPG 파일을 지원합니다.</p>
                        <input type="file" id="file-upload" class="d-none" accept="image/png, image/jpeg, image/jpg">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Right Offcanvas Menu -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="rightMenu" aria-labelledby="rightMenuLabel">
        <div class="offcanvas-header bg-soft-primary pb-4 pt-4 border-bottom-0">
            <div class="d-flex align-items-center w-100">
                <img src="https://ui-avatars.com/api/?name=홍길동&background=random&color=fff&size=48" alt="프로필"
                    class="profile-img-sm me-3 shadow-sm border border-light">
                <div class="flex-grow-1 text-white">
                    <h5 class="mb-0 fw-bold">홍길동 님</h5>
                    <span class="small opacity-75">프리미엄 회원</span>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                    aria-label="Close"></button>
            </div>
        </div>

        <div class="offcanvas-body p-4 d-flex flex-column">
            <h6 class="text-soft fw-bold mb-3 small text-uppercase">주요 서비스</h6>

            <a href="#" class="d-flex align-items-center menu-item px-3 py-3 mb-2">
                <div class="bg-soft-primary text-primary-custom rounded p-2 me-3">
                    <i class="bi bi-house-door-fill fs-5"></i>
                </div>
                <span class="fw-medium">홈 (대시보드)</span>
            </a>

            <a href="#" class="d-flex align-items-center menu-item px-3 py-3 mb-2">
                <div class="bg-soft-primary text-primary-custom rounded p-2 me-3">
                    <i class="bi bi-person-lines-fill fs-5"></i>
                </div>
                <span class="fw-medium">내 건강 프로필</span>
            </a>

            <a href="#" class="d-flex align-items-center menu-item px-3 py-3 mb-2">
                <div class="bg-soft-primary text-primary-custom rounded p-2 me-3">
                    <i class="bi bi-capsule-pill fs-5"></i>
                </div>
                <span class="fw-medium">전체 복약 기록</span>
            </a>

            <a href="#" class="d-flex align-items-center menu-item px-3 py-3 mb-2">
                <div class="bg-soft-primary text-primary-custom rounded p-2 me-3">
                    <i class="bi bi-file-earmark-medical-fill fs-5"></i>
                </div>
                <span class="fw-medium">처방전 관리 보관함</span>
            </a>

            <div class="mt-auto pt-4 border-top">
                <a href="index.html"
                    class="d-flex align-items-center text-danger text-decoration-none px-3 py-2 menu-item">
                    <i class="bi bi-box-arrow-right me-3 fs-5"></i>
                    <span class="fw-bold">로그아웃</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('file-upload').addEventListener('change', function (e) {
            if (e.target.files.length > 0) {
                alert(e.target.files[0].name + " 파일이 선택되었습니다.");
            }
        });

        // Checkbox interaction
        const checks = document.querySelectorAll('.form-check-input');
        checks.forEach(check => {
            check.addEventListener('change', function (e) {
                let parentItem = e.target.closest('.medication-check-item');
                if (e.target.checked) {
                    parentItem.classList.remove('bg-white', 'border', 'border-light', 'shadow-sm');
                    let textEls = parentItem.querySelectorAll('.text-danger');
                    textEls.forEach(el => el.classList.remove('text-danger'));
                } else {
                    parentItem.classList.add('bg-white', 'border', 'border-light', 'shadow-sm');
                }
            });
        });
    </script>
</body>

</html>
