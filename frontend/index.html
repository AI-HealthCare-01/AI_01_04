<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-text="index.title">당신의 건강을 기원합니다 - MEDIMATE</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="css/style.css"/>

  <style>
    body { background:#f7faf8; min-height:100vh; display:flex; flex-direction:column; }

    .main-wrap { flex:1; display:flex; align-items:center; justify-content:center; }
    .intro-center { text-align:center; max-width:600px; padding:2rem; }

    .brand-logo {
      font-size:2.4rem; font-weight:700; color:#6da285;
      margin-bottom:6px; display:flex; align-items:center; justify-content:center; gap:12px;
    }
    .brand-logo i { font-size:2.6rem; color:#6da285; }
    .brand-sub { font-size:.88rem; color:#8c9b93; margin-bottom:32px; }

    #quote-container {
      min-height:80px; display:flex; align-items:center; justify-content:center;
      position:relative; margin-bottom:28px;
    }
    .quote-text {
      font-size:1.3rem; font-weight:300; line-height:1.7; color:#4a5d53;
      opacity:0; transition:opacity 1s ease-in-out; position:absolute; width:100%;
    }
    .quote-text.active { opacity:1; position:relative; }

    .feature-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:12px;
      margin-bottom:36px; text-align:left;
    }
    .feature-item {
      display:flex; align-items:flex-start; gap:10px; padding:14px 16px;
      border:1px solid #e2e8e4; border-radius:14px; background:#fff;
    }
    .feature-item i { color:#6da285; font-size:1.15rem; margin-top:2px; flex-shrink:0; }
    .feature-item .fi-title { font-size:.84rem; font-weight:600; color:#4a5d53; }
    .feature-item .fi-desc { font-size:.73rem; color:#8c9b93; margin-top:2px; }

    .btn-start {
      background:#6da285; color:#fff; border:none; border-radius:999px;
      padding:14px 48px; font-size:1rem; font-weight:600;
      box-shadow:0 4px 16px rgba(109,162,133,.3); transition:all .2s;
    }
    .btn-start:hover { background:#5a8e72; transform:translateY(-2px); box-shadow:0 6px 20px rgba(109,162,133,.4); }

    #start-btn-wrap { opacity:0; transition:opacity 1s ease; }

    /* Auth overlay */
    .auth-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.35);
      z-index:1000; align-items:center; justify-content:center;
    }
    .auth-overlay.show { display:flex; }
    .auth-card {
      background:#fff; border-radius:20px; padding:32px 32px 28px;
      width:100%; max-width:420px; box-shadow:0 12px 40px rgba(0,0,0,.12);
      position:relative; animation:slideUp .35s ease;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .auth-card .close-btn {
      position:absolute; top:14px; right:16px; background:none;
      border:none; font-size:1.2rem; color:#aaa; cursor:pointer;
    }
    .auth-card .close-btn:hover { color:#555; }
    .auth-card h5 { font-weight:700; color:#4a5d53; font-size:1.05rem; margin-bottom:2px; }
    .auth-card .auth-sub { font-size:.8rem; color:#8c9b93; margin-bottom:20px; }
    .auth-card label { font-size:.75rem; color:#8c9b93; font-weight:500; margin-bottom:4px; }
    .auth-card .form-control, .auth-card .form-select {
      border:1px solid #e2e8e4; border-radius:8px; padding:9px 12px;
      font-size:.84rem; background:#fafdfb;
    }
    .auth-card .form-control:focus, .auth-card .form-select:focus {
      border-color:#6da285; box-shadow:0 0 0 2px rgba(109,162,133,.2); background:#fff;
    }
    .btn-auth {
      background:#6da285; color:#fff; border:none; border-radius:10px;
      padding:11px; font-size:.88rem; font-weight:600; width:100%; transition:background .2s;
    }
    .btn-auth:hover { background:#5a8e72; }
    .auth-toggle { font-size:.8rem; color:#8c9b93; text-align:center; margin-top:14px; }
    .auth-toggle a { color:#6da285; font-weight:600; text-decoration:none; cursor:pointer; }
    .auth-toggle a:hover { text-decoration:underline; }

    .form-container { display:none; }
    .form-container.active { display:block; animation:fadeIn .35s ease; }

    #auth-error {
      display:none; background:#fff0f0; border:1px solid #fdd; color:#c0392b;
      border-radius:8px; padding:8px 12px; font-size:.78rem; margin-bottom:14px;
    }
    #auth-error.show { display:block; }

    @media(max-width:576px) {
      .feature-grid { grid-template-columns:1fr; }
      .brand-logo { font-size:1.8rem; }
      .brand-logo i { font-size:2rem; }
      .auth-card { margin:0 16px; padding:24px 20px 20px; }
    }
  </style>
</head>
<body>

<div class="main-wrap">
  <div class="intro-center">
    <div class="brand-logo"><i class="bi bi-activity"></i> MEDIMATE</div>
    <div class="brand-sub" data-text="common.serviceTagline">당신의 곁에, 언제나</div>

    <div id="quote-container"></div>

    <div class="feature-grid">
      <div class="feature-item">
        <i class="bi bi-file-earmark-medical"></i>
        <div><div class="fi-title">문서 자동 분석</div><div class="fi-desc">처방전·진단서를 AI가 즉시 분석</div></div>
      </div>
      <div class="feature-item">
        <i class="bi bi-capsule"></i>
        <div><div class="fi-title">복약 스케줄</div><div class="fi-desc">시간대별 복용 알림 및 이력 관리</div></div>
      </div>
      <div class="feature-item">
        <i class="bi bi-heart-pulse"></i>
        <div><div class="fi-title">건강 목표</div><div class="fi-desc">맞춤 생활 습관 가이드 제공</div></div>
      </div>
      <div class="feature-item">
        <i class="bi bi-chat-dots"></i>
        <div><div class="fi-title">AI 상담</div><div class="fi-desc">24시간 복약·건강 질문 응답</div></div>
      </div>
    </div>

    <div id="start-btn-wrap">
      <button class="btn-start" onclick="openAuth()" data-text="index.startButton">시작하기</button>
    </div>
  </div>
</div>

<!-- Auth Overlay -->
<div class="auth-overlay" id="authOverlay" onclick="if(event.target===this)closeAuth()">
  <div class="auth-card">
    <button class="close-btn" onclick="closeAuth()"><i class="bi bi-x-lg"></i></button>
    <h5 id="auth-title"><i class="bi bi-box-arrow-in-right me-1" style="color:#6da285"></i><span data-text="index.loginTitle">로그인</span></h5>
    <div class="auth-sub" id="auth-subtitle" data-text="index.loginSubtitle">서비스 이용을 위해 로그인해주세요.</div>

    <div id="auth-error"></div>

    <form id="login-form" class="form-container active" onsubmit="handleLogin(event)">
      <div class="mb-3">
        <label data-text="index.fields.email">이메일</label>
        <input type="email" id="login-email" class="form-control" placeholder="example@email.com" required/>
      </div>
      <div class="mb-3">
        <label data-text="index.fields.password">비밀번호</label>
        <input type="password" id="login-password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" id="login-btn" class="btn-auth" data-text="index.buttons.login">로그인</button>
      <div class="auth-toggle"><span data-text="index.prompts.noAccount">계정이 없으신가요?</span> <a onclick="toggleAuthMode('signup')" data-text="index.buttons.goSignup">회원가입</a></div>
    </form>

    <form id="signup-form" class="form-container" onsubmit="handleSignup(event)">
      <div class="mb-2">
        <label data-text="index.fields.name">이름</label>
        <input type="text" id="signup-name" class="form-control" placeholder="홍길동" required/>
      </div>
      <div class="mb-2">
        <label data-text="index.fields.email">이메일</label>
        <input type="email" id="signup-email" class="form-control" placeholder="example@email.com" required/>
      </div>
      <div class="mb-2">
        <label data-text="index.fields.passwordSetup">비밀번호 설정</label>
        <input type="password" id="signup-password" class="form-control" placeholder="••••••••" required/>
      </div>
      <div class="mb-2">
        <label data-text="index.fields.phone">휴대폰 번호</label>
        <input type="tel" id="signup-phone" class="form-control" placeholder="010-1234-5678" required/>
      </div>
      <div class="mb-2">
        <label data-text="index.fields.birthday">생년월일</label>
        <input type="date" id="signup-birthday" class="form-control" required/>
      </div>
      <div class="mb-3">
        <label data-text="index.fields.gender">성별</label>
        <select id="signup-gender" class="form-select" required>
          <option value="" data-text="index.prompts.genderSelect">선택하세요</option>
          <option value="MALE" data-text="index.prompts.genderMale">남성</option>
          <option value="FEMALE" data-text="index.prompts.genderFemale">여성</option>
        </select>
      </div>
      <button type="submit" id="signup-btn" class="btn-auth" data-text="index.buttons.signup">회원가입 완료</button>
      <div class="auth-toggle"><span data-text="index.prompts.hasAccount">이미 계정이 있으신가요?</span> <a onclick="toggleAuthMode('login')" data-text="index.buttons.goLogin">로그인하러 가기</a></div>
    </form>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/texts.js"></script>
<script src="js/api.js"></script>
<script>
if (localStorage.getItem('access_token')) {
  window.location.href = 'dashboard.html';
}

document.addEventListener('DOMContentLoaded', () => {
  applyTextBindings();
  document.title = getText('index.title', document.title);

  // Quote rotation from texts.js
  const quotes = getText('index.quotes', []);
  const container = document.getElementById('quote-container');
  if (quotes.length) {
    quotes.forEach((q, i) => {
      const div = document.createElement('div');
      div.className = 'quote-text' + (i === 0 ? ' active' : '');
      div.textContent = '"' + q + '"';
      container.appendChild(div);
    });
    let cur = 0;
    const els = container.querySelectorAll('.quote-text');
    setInterval(() => {
      els[cur].classList.remove('active');
      cur = (cur + 1) % els.length;
      els[cur].classList.add('active');
    }, 3000);
  }

  setTimeout(() => { document.getElementById('start-btn-wrap').style.opacity = '1'; }, 1500);
});

function openAuth() { document.getElementById('authOverlay').classList.add('show'); }
function closeAuth() { document.getElementById('authOverlay').classList.remove('show'); hideError(); }

function showError(msg) { const el = document.getElementById('auth-error'); el.textContent = msg; el.classList.add('show'); }
function hideError() { document.getElementById('auth-error').classList.remove('show'); }

function toggleAuthMode(mode) {
  hideError();
  const login = document.getElementById('login-form');
  const signup = document.getElementById('signup-form');
  const title = document.getElementById('auth-title');
  const sub = document.getElementById('auth-subtitle');
  if (mode === 'signup') {
    login.classList.remove('active'); signup.classList.add('active');
    title.innerHTML = '<i class="bi bi-person-plus me-1" style="color:#6da285"></i>' + getText('index.signupTitle', '회원가입');
    sub.textContent = getText('index.signupSubtitle', '가입을 환영합니다.');
  } else {
    signup.classList.remove('active'); login.classList.add('active');
    title.innerHTML = '<i class="bi bi-box-arrow-in-right me-1" style="color:#6da285"></i>' + getText('index.loginTitle', '로그인');
    sub.textContent = getText('index.reloginSubtitle', '다시 오신 것을 환영합니다.');
  }
}

async function handleLogin(event) {
  event.preventDefault();
  hideError();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '로그인 중...';
  try {
    const data = await window.api.login(email, password);
    localStorage.setItem('access_token', data.access_token);
    localStorage.setItem('user_name', data.name || '');
    window.location.href = 'dashboard.html';
  } catch (err) {
    showError(err.message || '로그인에 실패했습니다.');
  } finally {
    btn.disabled = false;
    btn.textContent = getText('index.buttons.login', '로그인');
  }
}

async function handleSignup(event) {
  event.preventDefault();
  hideError();
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const phone_number = document.getElementById('signup-phone').value.trim();
  const birthday = document.getElementById('signup-birthday').value;
  const gender = document.getElementById('signup-gender').value;
  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = '가입 중...';
  try {
    await window.api.signup(name, email, gender, birthday, phone_number, password);
    alert(getText('index.prompts.signupSuccess', '가입이 완료되었습니다. 다시 로그인해주세요.'));
    toggleAuthMode('login');
    event.target.reset();
  } catch (err) {
    showError(err.message || '회원가입에 실패했습니다.');
  } finally {
    btn.disabled = false;
    btn.textContent = getText('index.buttons.signup', '회원가입 완료');
  }
}
</script>

</body>
</html>
