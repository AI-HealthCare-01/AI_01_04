<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-text="medications.title">복약 기록 리스트</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .medication-check-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .medication-check-item.done {
            background-color: #f0fdf4 !important;
            border: 1px solid #bbf7d0 !important;
            opacity: 0.8;
        }

        .medication-check-item.pending {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .medication-check-item:hover {
            border-color: var(--primary-color);
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
        }
    </style>
</head>

<body>

    <!-- Mobile Menu Button -->
    <button class="btn btn-primary d-lg-none position-fixed top-0 end-0 m-3 z-3" type="button"
        onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>

    <div class="app-wrapper">
        <!-- Sidebar -->
        <nav id="sidebar-container" class="sidebar shadow-sm"></nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="fade-in mb-4 pb-2 border-bottom d-flex justify-content-between align-items-center">
                <div>
                    <h3 class="fw-bold mb-0" data-text="medications.title">전체 복약 기록 관리</h3>
                    <p class="text-soft mt-1 mb-0" data-text="medications.subtitle">오늘 드셔야 할 약과 지금까지의 이력을 확인하고 체크하세요.</p>
                </div>
            </div>

            <!-- Error / Loading Overlay -->
            <div id="loading" class="text-center py-5">
                <div class="spinner-border text-primary-custom" role="status"></div>
                <p class="mt-2 text-soft" data-text="medications.loading">복약 데이터를 불러오는 중입니다...</p>
            </div>

            <div class="row g-4 fade-in d-none" id="content-container">
                <div class="col-12">

                    <!-- Filters (Just visual for now, API supports from/to) -->
                    <div class="card p-3 mb-4 flex-row justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-2">
                            <button class="btn btn-primary btn-sm rounded-pill" onclick="loadMedications()" data-text="medications.recentButton">최근 2주
                                일정</button>
                        </div>
                        <a href="scans.html" class="btn btn-outline-primary btn-sm"><i class="bi bi-plus-lg me-1"></i><span data-text="medications.newScanButton">새
                            처방전 등록</span></a>
                    </div>

                    <div id="medication-list" class="d-flex flex-column gap-2">
                        <!-- Javascript items injected here -->
                    </div>

                    <div id="empty-state" class="text-center py-5 d-none">
                        <i class="bi bi-inbox text-soft display-1"></i>
                        <h5 class="text-soft mt-3" data-text="medications.emptyTitle">등록된 복약 일정이 없습니다.</h5>
                        <p class="text-secondary small" data-text="medications.emptySubtitle">처방전을 스캔하여 자동으로 복약 일정을 생성하세요.</p>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/texts.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>

    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('show');
        }

        // Toggle Status API Call
        async function toggleMedication(logId, currentStatus, elId) {
            const checkbox = document.getElementById(elId);
            const newItem = document.getElementById(`item-${logId}`);
            const newStatus = currentStatus === 'taken' ? 'skipped' : 'taken';

            try {
                checkbox.disabled = true;
                await window.api.updateMedicationLog(logId, newStatus);

                // visually update UI instantly to save fetch time
                if (newStatus === 'taken') {
                    newItem.classList.remove('pending');
                    newItem.classList.add('done');
                    checkbox.checked = true;

                    // Update badge and text styling
                    const title = newItem.querySelector('.med-title');
                    title.classList.add('text-muted', 'text-decoration-line-through');
                    title.classList.remove('text-dark');

                    const badge = newItem.querySelector('.status-badge');
                    badge.className = 'badge bg-success bg-opacity-10 text-success rounded-pill status-badge float-end';
                    badge.innerText = getText('medications.taken', '복용 완료');

                } else {
                    newItem.classList.remove('done');
                    newItem.classList.add('pending');
                    checkbox.checked = false;

                    const title = newItem.querySelector('.med-title');
                    title.classList.remove('text-muted', 'text-decoration-line-through');
                    title.classList.add('text-dark');

                    const badge = newItem.querySelector('.status-badge');
                    badge.className = 'badge bg-danger bg-opacity-10 text-danger rounded-pill status-badge float-end';
                    badge.innerText = getText('medications.skipped', '미복용');
                }

                // Update data attribute for event delegation
                newItem.dataset.status = newStatus;

            } catch (err) {
                alert(getText('medications.updateError', '업데이트 중 오류가 발생했습니다: ') + err.message);
                checkbox.checked = currentStatus === 'taken'; // revert
            } finally {
                checkbox.disabled = false;
            }
        }

        async function loadMedications() {
            document.getElementById('loading').classList.remove('d-none');
            document.getElementById('content-container').classList.add('d-none');
            document.getElementById('empty-state').classList.add('d-none');

            try {
                applyTextBindings();
                document.title = getText('medications.title', document.title);
                // Get past 14 days and future 7 days
                const data = await window.api.getMedicationHistory("?size=50");
                const container = document.getElementById('medication-list');
                container.innerHTML = '';

                if (!data.items || data.items.length === 0) {
                    document.getElementById('empty-state').classList.remove('d-none');
                    return;
                }

                let medicationHtml = "";
                const dates = data.items.map(item => item.detail_key || item.date);
                const dayDetails = await Promise.all(
                    dates.map(date => window.api.fetchAPI(`/medications/history/${date}`))
                );

                dayDetails.forEach(day => {
                    medicationHtml += `<h6 class="fw-bold text-soft mt-3 mb-2 ms-2"><i class="bi bi-calendar-check me-2"></i>${day.date}${getText('medications.daySuffix', ' 일정')}</h6>`;

                    if (!day.items || day.items.length === 0) {
                        medicationHtml += `<div class="text-soft small ms-2 mb-3">${getText('medications.noItems', '등록된 복약 체크 항목이 없습니다.')}</div>`;
                        return;
                    }

                    day.items.forEach(log => {
                    const isDone = log.status === 'taken';
                    const mainClass = isDone ? 'done' : 'pending';
                    const elId = `chk-${log.id}`;
                    const titleColor = isDone ? 'text-muted text-decoration-line-through' : 'text-dark';
                    const badgeHtml = isDone
                        ? `<span class="badge bg-success bg-opacity-10 text-success rounded-pill status-badge float-end">${getText('medications.taken', '복용 완료')}</span>`
                        : `<span class="badge bg-danger bg-opacity-10 text-danger rounded-pill status-badge float-end">${getText('medications.skipped', '미복용')}</span>`;

                    medicationHtml += `
                <div class="medication-check-item ${mainClass}" id="item-${log.id}" data-log-id="${log.id}" data-status="${escapeHtml(log.status)}" data-el-id="${elId}">
                    <div class="form-check fs-5 m-0 me-3" style="pointer-events: none;">
                        <input class="form-check-input" type="checkbox" id="${elId}" ${isDone ? 'checked' : ''}>
                    </div>
                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between align-items-center w-100 mb-1">
                            <span class="fw-bold fs-6 med-title ${titleColor}">${escapeHtml(log.label)}</span>
                            ${badgeHtml}
                        </div>
                        <div class="text-soft fs-6 small d-flex flex-wrap gap-2">
                           <span><i class="bi bi-clock me-1"></i>${escapeHtml(log.intake_datetime || getText('medications.noRecord', '기록 없음'))}</span>
                           <span><i class="bi bi-capsule me-1"></i>${escapeHtml(log.status)}</span>
                        </div>
                    </div>
                </div>
                `;
                    });
                });

                container.innerHTML = medicationHtml;

            } catch (err) {
                alert(getText('medications.loadError', '데이터를 불러오지 못했습니다: ') + err.message);
            } finally {
                document.getElementById('loading').classList.add('d-none');
                document.getElementById('content-container').classList.remove('d-none');
            }
        }

        document.addEventListener("DOMContentLoaded", loadMedications);

        // Event delegation for medication items
        document.getElementById('medication-list').addEventListener('click', (e) => {
            const item = e.target.closest('.medication-check-item');
            if (!item) return;
            const logId = parseInt(item.dataset.logId);
            const status = item.dataset.status;
            const elId = item.dataset.elId;
            toggleMedication(logId, status, elId);
        });

    </script>
</body>

</html>
