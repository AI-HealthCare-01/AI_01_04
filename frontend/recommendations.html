<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-text="recommendations.title">AI 맞춤 추천 - MEDIMATE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { background:#f5f7fb; }

    .top-header { background:#fff; border-bottom:1px solid #eee; padding:.7rem 2rem; }
    .top-header .brand { font-weight:600; color:#6da285; font-size:.95rem; }
    .top-header .brand i { color:#6da285; }
    .user-area { font-size:.85rem; }
    .user-area .btn-myinfo {
      background:#f0f0f0; border:none; border-radius:8px;
      font-size:.8rem; padding:.3rem .85rem; color:#333; text-decoration:none;
    }

    .dashboard-card {
      max-width:1200px; margin:32px auto; background:#fff;
      border-radius:20px; padding:32px 36px 40px; border:1px solid #e5e7eb;
    }

    .hero-label { font-size:.78rem; color:#6da285; font-weight:500; }
    .hero-label i { color:#6da285; }
    .hero-title { font-size:1.6rem; font-weight:700; color:#111; margin:4px 0 6px; }
    .hero-desc { color:#888; font-size:.88rem; margin:0 0 20px; }

    .dashboard-tabs {
      display:flex; gap:4px; background:#f1f3f5; padding:5px;
      border-radius:999px; margin-bottom:24px; overflow-x:auto;
    }
    .dashboard-tabs a {
      flex:1; text-align:center; padding:9px 18px; border-radius:999px;
      text-decoration:none; color:#6da285; font-size:.84rem; font-weight:500;
      white-space:nowrap; transition:all .15s;
    }
    .dashboard-tabs a.active { background:#fff; color:#111; font-weight:600; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .dashboard-tabs a:hover:not(.active) { color:#4a8a68; }

    .rec-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
    .rec-card {
      border:1px solid #e5e7eb; border-radius:14px; padding:20px;
      background:#fff; transition:all .15s; display:flex; flex-direction:column;
    }
    .rec-card:hover { border-color:#6da285; box-shadow:0 4px 16px rgba(109,162,133,.1); }
    .rec-card .rc-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .rec-card .rc-badge { font-size:.7rem; padding:3px 10px; border-radius:999px; font-weight:600; color:#fff; }
    .rc-badge.lifestyle { background:#6da285; }
    .rc-badge.medication { background:#5b9bd5; }
    .rc-badge.warning { background:#e8a735; }
    .rc-badge.followup { background:#8e7cc3; }
    .rec-card .rc-content { font-size:.9rem; color:#333; font-weight:500; flex:1; margin-bottom:14px; line-height:1.5; }
    .rec-card .rc-meta { font-size:.72rem; color:#bbb; }
    .rec-card .rc-actions {
      display:flex; justify-content:space-between; align-items:center;
      padding-top:10px; border-top:1px solid #f2f2f2;
    }
    .rc-actions .rc-helpful { font-size:.78rem; color:#999; }
    .rc-actions button {
      border:none; background:none; font-size:1.1rem; cursor:pointer;
      padding:4px 8px; border-radius:8px; transition:all .15s;
    }
    .rc-actions button:hover { background:#f0f5f2; }
    .rc-actions .btn-like { color:#6da285; }
    .rc-actions .btn-like.active { color:#fff; background:#6da285; }
    .rc-actions .btn-dislike { color:#ccc; }
    .rc-actions .btn-dislike.active { color:#fff; background:#e74c6f; }
    .rec-card.disabled { opacity:.45; pointer-events:none; }
    .rec-card .rc-disabled-msg {
      font-size:.78rem; color:#bbb; text-decoration:line-through;
      padding-top:10px; border-top:1px solid #f2f2f2;
    }

    .empty-state { text-align:center; padding:60px 20px; }
    .empty-state i { font-size:3rem; color:#ddd; margin-bottom:16px; }
    .empty-state h5 { color:#999; font-weight:600; }
    .empty-state p { color:#bbb; font-size:.88rem; }

    .floating-chatbot {
      position:fixed; right:24px; bottom:24px;
      background:#6da285; color:#fff; border:none; border-radius:999px;
      padding:14px 22px; font-size:.88rem; font-weight:600;
      box-shadow:0 4px 18px rgba(109,162,133,.4); z-index:1050;
      text-decoration:none; display:flex; align-items:center; gap:8px;
    }
    .floating-chatbot:hover { background:#5a8e72; color:#fff; }
    .floating-chatbot .notif-dot {
      width:8px; height:8px; background:#ff5c5c; border-radius:50%;
      position:absolute; top:10px; right:14px;
    }

    @media(max-width:768px) {
      .dashboard-card { margin:16px 10px; padding:20px 16px 28px; }
      .top-header { padding:.6rem 1rem; }
      .dashboard-tabs a { padding:7px 12px; font-size:.78rem; }
      .rec-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<nav class="top-header d-flex justify-content-between align-items-center sticky-top">
  <div class="brand d-flex align-items-center gap-2">
    <i class="bi bi-activity"></i> MEDIMATE
    <span style="font-weight:400;color:#999;font-size:.78rem;margin-left:6px" data-text="common.serviceTagline">당신의 곁에, 언제나</span>
  </div>
  <div class="user-area d-flex align-items-center gap-3">
    <span class="text-muted" id="header-user-name">환영합니다</span>
    <a href="profile.html" class="btn btn-myinfo"><i class="bi bi-person-fill me-1"></i>내 정보</a>
  </div>
</nav>

<div class="dashboard-card">
  <div class="mb-1">
    <div class="hero-label"><i class="bi bi-activity me-1"></i>MEDIMATE</div>
    <div class="hero-title" data-text="recommendations.title">AI 맞춤 추천 콘텐츠</div>
    <p class="hero-desc" data-text="recommendations.subtitle">입력하신 신체 정보와 처방전/진단서 분석을 바탕으로 AI가 제안합니다.</p>
  </div>

  <div class="dashboard-tabs">
    <a href="profile.html"><i class="bi bi-person me-1"></i>내 프로필</a>
    <a href="dashboard.html"><i class="bi bi-grid-1x2 me-1"></i>대시보드</a>
    <a href="scans.html"><i class="bi bi-file-earmark-plus me-1"></i>새 문서 등록</a>
    <a href="medications.html"><i class="bi bi-capsule me-1"></i>복용 관리 이력</a>
    <a href="health.html"><i class="bi bi-heart-pulse me-1"></i>건강 관리 이력</a>
    <a href="chatbot.html"><i class="bi bi-chat-dots me-1"></i>AI 챗봇</a>
  </div>

  <div id="rec-container"></div>
</div>

<a href="chatbot.html" class="floating-chatbot">
  <i class="bi bi-robot"></i> MEDIMATE 챗봇
  <span class="notif-dot"></span>
</a>

<script src="js/utils.js"></script>
<script src="js/texts.js"></script>
<script src="js/api.js"></script>
<script>
if (!localStorage.getItem('access_token')) window.location.href = 'index.html';

const TYPE_LABELS = {lifestyle:'생활관리',medication:'복약',warning:'주의',followup:'추적관찰'};
const TYPE_ICONS = {lifestyle:'bi-heart-pulse',medication:'bi-capsule',warning:'bi-exclamation-triangle',followup:'bi-calendar-check'};

let recommendations = [];
let feedbackState = {};

function renderRecommendations() {
  const container = document.getElementById('rec-container');

  if (!recommendations.length) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="bi bi-lightbulb"></i>
        <h5>${escapeHtml(getText('recommendations.emptyTitle', '아직 맞춤 추천 내역이 생성되지 않았습니다.'))}</h5>
        <p>${escapeHtml(getText('recommendations.emptySubtitle', '프로필 정보를 채우거나 처방전을 등록하시면 AI가 똑똑하게 분석합니다.'))}</p>
        <div class="d-flex gap-2 justify-content-center mt-3">
          <a href="scans.html" class="btn btn-primary btn-sm">${escapeHtml(getText('recommendations.scanButton', '처방전 스캔하러 가기'))}</a>
          <a href="chatbot.html" class="btn btn-outline-primary btn-sm">${escapeHtml(getText('recommendations.chatbotButton', 'AI 상담으로 이어가기'))}</a>
        </div>
      </div>`;
    return;
  }

  container.innerHTML = '<div class="rec-grid" id="recGrid"></div>';
  const grid = document.getElementById('recGrid');

  grid.innerHTML = recommendations.map(r => {
    const fb = feedbackState[r.id];
    const type = r.recommendation_type || 'lifestyle';

    if (fb === 'dislike') {
      return `<div class="rec-card disabled">
        <div class="rc-top"><span class="rc-badge ${type}">${escapeHtml(TYPE_LABELS[type] || type)}</span></div>
        <div class="rc-content">${escapeHtml(r.content || '-')}</div>
        <div class="rc-disabled-msg"><i class="bi bi-x-circle me-1"></i>${escapeHtml(getText('recommendations.disabledMessage', 'AI가 이 콘텐츠를 더 이상 추천하지 않습니다.'))}</div>
      </div>`;
    }

    const likeActive = fb === 'like' ? ' active' : '';
    return `<div class="rec-card">
      <div class="rc-top">
        <span class="rc-badge ${type}"><i class="bi ${TYPE_ICONS[type] || 'bi-info-circle'} me-1"></i>${escapeHtml(TYPE_LABELS[type] || type)}</span>
        <span class="rc-meta">${r.score ? getText('recommendations.scoreLabel', '점수') + ' ' + r.score : ''} ${r.rank ? '· ' + r.rank + getText('recommendations.rankLabel', '순위') : ''}</span>
      </div>
      <div class="rc-content">${escapeHtml(r.content || '-')}</div>
      <div class="rc-actions">
        <span class="rc-helpful">${escapeHtml(getText('recommendations.helpful', '도움이 되셨나요?'))}</span>
        <div>
          <button class="btn-like${likeActive}" onclick="sendFeedback(${r.id},'like')" title="좋아요"><i class="bi bi-hand-thumbs-up-fill"></i></button>
          <button class="btn-dislike" onclick="sendFeedback(${r.id},'dislike')" title="별로예요"><i class="bi bi-hand-thumbs-down-fill"></i></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function sendFeedback(recId, type) {
  try {
    await window.api.sendFeedback(recId, type);
    feedbackState[recId] = type;
    renderRecommendations();
  } catch (err) {
    console.error('Feedback failed:', err);
  }
}

async function loadPage() {
  applyTextBindings();
  document.title = getText('recommendations.title', document.title);

  try {
    const user = await window.api.getUserMe();
    document.getElementById('header-user-name').textContent = '환영합니다, ' + (user.name || '사용자') + '님';
  } catch {}

  try {
    recommendations = await window.api.getActiveRecommendations();
  } catch (err) {
    recommendations = [];
    console.error(getText('recommendations.loadError', '데이터를 불러오지 못했습니다: ') + err.message);
  }

  renderRecommendations();
}

document.addEventListener('DOMContentLoaded', loadPage);
</script>

</body>
</html>
