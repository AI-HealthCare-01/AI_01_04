<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-text="profile.title">내 건강 프로필</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Mobile Menu Button -->
    <button class="btn btn-primary d-lg-none position-fixed top-0 end-0 m-3 z-3" type="button"
        onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>

    <div class="app-wrapper">
        <!-- Sidebar -->
        <nav id="sidebar-container" class="sidebar shadow-sm"></nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="fade-in mb-4 pb-2 border-bottom">
                <h3 class="fw-bold mb-0" data-text="profile.title">내 건강 프로필 설정</h3>
                <p class="text-soft mt-1 mb-0" data-text="profile.subtitle">정확한 정보를 입력할수록 더 정교한 분석 결과를 받으실 수 있습니다.</p>
            </div>

            <div class="row g-4 fade-in">
                <div class="col-md-5 col-lg-4">
                    <div class="card p-4 text-center h-100">
                        <h5 class="fw-bold text-primary-custom mb-3" data-text="profile.photoTitle">프로필 사진</h5>

                        <img id="profile-img-preview" src="https://ui-avatars.com/api/?name=User&background=6da285&color=fff&size=120" alt="프로필"
                            class="profile-img-lg mb-3 shadow mx-auto d-block" style="width:120px;height:120px;">
                        <p id="profile-email" class="text-soft mb-4" data-text="profile.loadingEmail">계정 로딩 중...</p>

                        <div id="upload-status" class="alert p-2 small d-none"></div>

                        <input type="file" id="profile-img-input" class="d-none"
                            accept="image/png, image/jpeg, image/jpg" onchange="uploadProfileImage(event)">
                        <button class="btn btn-outline-primary w-100 rounded-pill"
                            onclick="document.getElementById('profile-img-input').click()">
                            <i class="bi bi-camera me-1"></i><span data-text="profile.changePhoto"> 사진 변경하기</span>
                        </button>
                    </div>
                </div>

                <div class="col-md-7 col-lg-8">
                    <div class="card p-4 h-100">
                        <h5 class="fw-bold text-primary-custom mb-4" data-text="profile.formTitle">기본 정보 수정</h5>

                        <div id="update-status" class="alert p-2 small d-none"></div>

                        <form id="profile-form" onsubmit="updateProfile(event)">
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small fw-medium" data-text="profile.name">이름</label>
                                    <input type="text" id="prof-name" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small fw-medium" data-text="profile.birthday">생년월일 (YYYY-MM-DD)</label>
                                    <input type="date" id="prof-birth" class="form-control">
                                </div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small fw-medium" data-text="profile.gender">성별</label>
                                    <select id="prof-gender" class="form-select border-1 px-3 py-2 bg-light">
                                        <option value="" data-text="profile.genderNone">선택 안함</option>
                                        <option value="MALE" data-text="profile.genderMale">남성</option>
                                        <option value="FEMALE" data-text="profile.genderFemale">여성</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small fw-medium" data-text="profile.phone">휴대폰 번호</label>
                                    <input type="tel" id="prof-phone" class="form-control" data-placeholder="profile.phonePlaceholder" placeholder="010-1234-5678">
                                </div>
                            </div>

                            <div class="d-flex justify-content-end">
                                <button type="submit" id="update-btn" class="btn btn-primary px-4 py-2">
                                    <span class="btn-text" data-text="profile.saveButton">정보 저장하기</span>
                                    <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/texts.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('show');
        }

        async function loadProfile() {
            try {
                applyTextBindings();
                document.title = getText('profile.title', document.title);
                const user = await window.api.getUserMe();

                // Populate form
                document.getElementById('prof-name').value = user.name || '';
                document.getElementById('prof-birth').value = user.birthday || '';
                document.getElementById('prof-gender').value = user.gender || '';
                document.getElementById('prof-phone').value = user.phone_number || '';

                document.getElementById('profile-email').innerText = user.email || '';

                const avUrl = user.profile_image_url
                    ? window.api.resolveBackendUrl(user.profile_image_url)
                    : `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name || 'User')}&background=random&color=fff&size=120`;
                document.getElementById('profile-img-preview').src = avUrl;

            } catch (err) {
                console.error("Failed to load profile", err);
            }
        }

        async function updateProfile(event) {
            event.preventDefault();
            const btn = document.getElementById('update-btn');
            const statusBox = document.getElementById('update-status');

            const data = {
                name: document.getElementById('prof-name').value || null,
                birthday: document.getElementById('prof-birth').value || null,
                gender: document.getElementById('prof-gender').value || null,
                phone_number: document.getElementById('prof-phone').value || null,
            };

            try {
                btn.disabled = true;
                btn.querySelector('.btn-text').classList.add('d-none');
                btn.querySelector('.spinner-border').classList.remove('d-none');
                statusBox.classList.add('d-none');
                statusBox.className = 'alert p-2 small';

                const updated = await window.api.fetchAPI('/users/me', { method: 'PATCH', body: data });

                statusBox.innerText = getText('profile.updateSuccess', '정보가 성공적으로 업데이트 되었습니다.');
                statusBox.classList.add('alert-success');
                statusBox.classList.remove('d-none', 'alert-danger');

                localStorage.setItem('user_name', updated.name); // update sidebars name globally
                renderSidebar();

            } catch (err) {
                statusBox.innerText = err.message;
                statusBox.classList.add('alert-danger');
                statusBox.classList.remove('d-none', 'alert-success');
            } finally {
                btn.disabled = false;
                btn.querySelector('.btn-text').classList.remove('d-none');
                btn.querySelector('.spinner-border').classList.add('d-none');
                setTimeout(() => { statusBox.classList.add('d-none'); }, 3000);
            }
        }

        async function uploadProfileImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const box = document.getElementById('upload-status');
            try {
                box.className = 'alert alert-info p-2 small';
                box.innerText = getText('profile.uploadLoading', '업로드 중입니다...');

                const formData = new FormData();
                formData.append('file', file);

                // fetch wrapper defaults to JSON unless formData is used
                const res = await window.api.fetchAPI('/users/me/profile-image', { method: 'POST', body: formData });

                document.getElementById('profile-img-preview').src = window.api.resolveBackendUrl(res.profile_image_url);
                box.className = 'alert alert-success p-2 small';
                box.innerText = getText('profile.uploadSuccess', '사진이 업데이트 되었습니다.');

            } catch (err) {
                box.className = 'alert alert-danger p-2 small';
                box.innerText = err.message;
            } finally {
                setTimeout(() => { box.classList.add('d-none'); }, 3000);
            }
        }

        document.addEventListener("DOMContentLoaded", loadProfile);
    </script>
</body>

</html>
