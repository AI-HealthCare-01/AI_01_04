<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI HealthCare Front</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <h1>AI HealthCare 사용자 콘솔</h1>
    <p>백엔드 연결 테스트 + 사용자 기능 통합 화면</p>
  </header>

  <main>
    <section class="card">
      <h2>연결 설정</h2>
      <div class="row">
        <label>API Base URL</label>
        <input id="baseUrl" type="text" value="http://localhost:8000/api/v1" />
      </div>
      <div class="row">
        <label>Access Token</label>
        <input id="accessToken" type="text" placeholder="Bearer 없이 토큰만 입력" />
      </div>
      <div class="actions">
        <button id="saveConfigBtn" type="button">토큰 저장</button>
        <button id="clearTokenBtn" type="button" class="ghost">토큰 삭제</button>
      </div>
    </section>

    <section class="grid2">
      <article class="card">
        <h2>인증</h2>
        <h3>회원가입</h3>
        <div class="row"><label>email</label><input id="signupEmail" type="email" placeholder="user@example.com" /></div>
        <div class="row"><label>password</label><input id="signupPassword" type="password" placeholder="8자 이상" /></div>
        <div class="row"><label>name</label><input id="signupName" type="text" placeholder="홍길동" /></div>
        <div class="row">
          <label>gender</label>
          <select id="signupGender">
            <option value="MALE">MALE</option>
            <option value="FEMALE">FEMALE</option>
          </select>
        </div>
        <div class="row"><label>birthday</label><input id="signupBirthday" type="date" /></div>
        <div class="row"><label>phone_number</label><input id="signupPhone" type="text" placeholder="01012345678" /></div>
        <div class="actions"><button id="signupBtn" type="button">회원가입</button></div>

        <h3>로그인</h3>
        <div class="row"><label>email</label><input id="loginEmail" type="email" placeholder="user@example.com" /></div>
        <div class="row"><label>password</label><input id="loginPassword" type="password" /></div>
        <div class="actions">
          <button id="loginBtn" type="button">로그인</button>
          <button id="refreshBtn" type="button" class="ghost">토큰 갱신</button>
        </div>
      </article>

      <article class="card">
        <h2>내 정보</h2>
        <div class="actions">
          <button id="meBtn" type="button">내 정보 조회</button>
        </div>
        <h3>수정(PATCH /users/me)</h3>
        <div class="row"><label>name</label><input id="meName" type="text" /></div>
        <div class="row"><label>email</label><input id="meEmail" type="email" /></div>
        <div class="row"><label>phone_number</label><input id="mePhone" type="text" /></div>
        <div class="row"><label>birthday</label><input id="meBirthday" type="date" /></div>
        <div class="row">
          <label>gender</label>
          <select id="meGender">
            <option value="">(변경 안함)</option>
            <option value="MALE">MALE</option>
            <option value="FEMALE">FEMALE</option>
          </select>
        </div>
        <div class="row"><label>profile_image_url</label><input id="meProfileUrl" type="text" /></div>
        <div class="actions"><button id="mePatchBtn" type="button">내 정보 수정</button></div>
      </article>
    </section>

    <section class="grid2">
      <article class="card">
        <h2>대시보드</h2>
        <div class="actions"><button id="dashboardBtn" type="button">요약 조회</button></div>
      </article>

      <article class="card">
        <h2>OCR 스캔</h2>
        <div class="row"><label>업로드 파일</label><input id="scanFile" type="file" /></div>
        <div class="actions"><button id="scanUploadBtn" type="button">파일 업로드</button></div>
        <div class="row"><label>scan_id</label><input id="scanId" type="number" min="1" /></div>
        <div class="actions">
          <button id="scanAnalyzeBtn" type="button">분석 시작</button>
          <button id="scanGetBtn" type="button">결과 조회</button>
          <button id="scanSaveBtn" type="button">결과 저장</button>
        </div>
        <h3>저장 결과</h3>
        <div class="row"><label>created_count</label><input id="scanCreatedCount" type="text" readonly /></div>
        <div class="row"><label>skipped_count</label><input id="scanSkippedCount" type="text" readonly /></div>
        <div class="row"><label>skipped_duplicates</label><input id="scanSkippedDupes" type="text" readonly /></div>
        <h3>결과 수동 수정</h3>
        <div class="row"><label>document_date</label><input id="scanDocDate" type="date" /></div>
        <div class="row"><label>diagnosis</label><input id="scanDiagnosis" type="text" /></div>
        <div class="row"><label>drugs(csv)</label><input id="scanDrugs" type="text" placeholder="타이레놀,판콜" /></div>
        <div class="actions"><button id="scanPatchBtn" type="button">결과 수정</button></div>
      </article>
    </section>

    <section class="grid2">
      <article class="card">
        <h2>복약</h2>
        <div class="row"><label>from</label><input id="medFrom" type="date" /></div>
        <div class="row"><label>to</label><input id="medTo" type="date" /></div>
        <div class="actions"><button id="medHistoryBtn" type="button">히스토리 조회</button></div>
        <div class="row"><label>date</label><input id="medDate" type="date" /></div>
        <div class="actions"><button id="medDayBtn" type="button">일자 상세 조회</button></div>
        <div class="row"><label>log_id</label><input id="medLogId" type="number" min="1" /></div>
        <div class="row">
          <label>status</label>
          <select id="medStatus">
            <option value="taken">taken</option>
            <option value="skipped">skipped</option>
            <option value="delayed">delayed</option>
          </select>
        </div>
        <div class="actions"><button id="medPatchBtn" type="button">복약 로그 수정</button></div>
      </article>

      <article class="card">
        <h2>건강관리</h2>
        <div class="row"><label>from</label><input id="healthFrom" type="date" /></div>
        <div class="row"><label>to</label><input id="healthTo" type="date" /></div>
        <div class="actions"><button id="healthHistoryBtn" type="button">히스토리 조회</button></div>
        <div class="row"><label>date</label><input id="healthDate" type="date" /></div>
        <div class="actions"><button id="healthDayBtn" type="button">일자 상세 조회</button></div>
        <div class="row"><label>log_id</label><input id="healthLogId" type="number" min="1" /></div>
        <div class="row">
          <label>status</label>
          <select id="healthStatus">
            <option value="done">done</option>
            <option value="skipped">skipped</option>
          </select>
        </div>
        <div class="actions"><button id="healthPatchBtn" type="button">건강 로그 수정</button></div>
      </article>
    </section>

    <section class="card">
      <h2>추천</h2>
      <div class="row"><label>scan_id</label><input id="recScanId" type="number" min="1" /></div>
      <div class="actions">
        <button id="recListBtn" type="button">스캔 기반 추천 조회</button>
        <button id="recSaveBtn" type="button">스캔 추천 저장</button>
      </div>
      <div class="row"><label>recommendation_id</label><input id="recId" type="number" min="1" /></div>
      <div class="row"><label>content</label><input id="recContent" type="text" /></div>
      <div class="row">
        <label>is_selected</label>
        <select id="recSelected">
          <option value="">(변경 안함)</option>
          <option value="true">true</option>
          <option value="false">false</option>
        </select>
      </div>
      <div class="actions">
        <button id="recPatchBtn" type="button">추천 수정</button>
        <button id="recDeleteBtn" type="button" class="danger">추천 삭제</button>
      </div>
    </section>

    <section class="card">
      <h2>실시간 로그</h2>
      <div class="actions">
        <button id="clearLogBtn" type="button" class="ghost">로그 지우기</button>
      </div>
      <pre id="logPanel"></pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
